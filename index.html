<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CastFlow - 보조출연자 및 조연 배우 관리 시스템</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        zinc: {
                            950: '#09090b',
                            900: '#121214',
                            800: '#1a1a1e',
                            700: '#27272a',
                            600: '#3f3f46',
                            500: '#71717a',
                            400: '#a1a1aa',
                            300: '#d4d4d8',
                            200: '#e4e4e7',
                            100: '#f4f4f5',
                            50: '#fafafa',
                        }
                    },
                    fontFamily: {
                        sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for compiling JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #e4e4e7;
            border-radius: 4px;
        }
        .dark ::-webkit-scrollbar-thumb:hover {
            background: #3f3f46;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #d4d4d8;
        }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen transition-colors duration-300">
    <div id="root"></div>

    <!-- React App Implementation -->
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Custom Inline SVG Icons to avoid loading delays or CDN dependencies
        const Icons = {
            Dashboard: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" />
                </svg>
            ),
            Users: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
            ),
            FileText: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
            ),
            Upload: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                </svg>
            ),
            Shield: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            ),
            Search: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            ),
            Filter: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
                </svg>
            ),
            Plus: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" />
                </svg>
            ),
            Edit: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                </svg>
            ),
            Trash: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            ),
            Close: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            ),
            Sun: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
                </svg>
            ),
            Moon: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            ),
            CheckCircle: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            ),
            Clock: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            ),
            AlertCircle: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            ),
            Eye: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path strokeLinecap="round" strokeLinejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
            ),
            EyeOff: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                </svg>
            ),
            ChevronLeft: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7" />
                </svg>
            ),
            ChevronRight: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7" />
                </svg>
            ),
            Check: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            ),
            Lock: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            ),
            Download: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
            ),
            Refresh: ({ className }) => (
                <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18" />
                </svg>
            )
        };

        // Static Lists for Generative Mock Data
        const SURNAMES = ["김", "이", "박", "최", "정", "강", "조", "윤", "장", "임", "한", "오", "서", "신", "권", "황", "안", "송", "전", "홍"];
        const GIVEN_NAMES_MALE = ["민준", "서준", "예준", "도윤", "시우", "주원", "하준", "지호", "준우", "현우", "건우", "우진", "민재", "현준", "준서", "유준", "성현", "은우", "태윤", "지환"];
        const GIVEN_NAMES_FEMALE = ["서연", "서현", "민서", "하은", "지우", "지민", "윤아", "지원", "채원", "서아", "다은", "예은", "수아", "지아", "예린", "소율", "지원", "유나", "시아", "하윤"];
        const SKILLS_LIST = [
            "영어 회화", "일본어 회화", "중국어 회화", "경상도 사투리", "전라도 사투리", "충청도 사투리", "북한 사투리",
            "승마", "태권도 3단", "검도", "현대무용", "발레", "기타 연주", "피아노 연주", "드럼 연주",
            "아크로바틱", "스쿠버다이빙", "오토바이 면허", "대형면허 운전", "복싱", "와이어 액션"
        ];
        const BODY_TYPES = ["마름", "슬림 근육질", "보통", "탄탄함", "건장함", "통통함"];
        const PROJECTS_LIST = ["프로젝트 서울", "광화문 연가", "조선 퇴마록", "한강 블루스", "비밀의 숲 3", "청담동 스캔들", "부산행 2"];
        const ROLES_LIST = ["행인", "경찰관", "카페 손님", "마약상 부하", "조선 백성", "회사원", "지하철 승객", "시위대", "의사", "조직원", "보좌관", "구조 대원"];
        const FILMOGRAPHY_EXAMPLES = [
            "오징어 게임", "기생충", "범죄도시 4", "괴물", "극한직업", "신과함께", "명량", "국제시장", "부산행", "베테랑", "더 글로리", "카지노", "무빙"
        ];

        // Seeded random helper for reproducible lists
        const seedRandom = (seed) => {
            const x = Math.sin(seed++) * 10000;
            return x - Math.floor(x);
        };

        // Generates detailed profiles
        const generateMockActor = (id, seed = id) => {
            const isMale = seedRandom(seed + 1) > 0.48;
            const surname = SURNAMES[Math.floor(seedRandom(seed + 2) * SURNAMES.length)];
            const givenNameList = isMale ? GIVEN_NAMES_MALE : GIVEN_NAMES_FEMALE;
            const givenName = givenNameList[Math.floor(seedRandom(seed + 3) * givenNameList.length)];
            const name = `${surname}${givenName}`;
            
            // Age distribution from 18 to 68
            const age = Math.floor(seedRandom(seed + 4) * 50) + 18;
            const currentYear = new Date().getFullYear();
            const birthYear = currentYear - age;
            const birthMonth = String(Math.floor(seedRandom(seed + 5) * 12) + 1).padStart(2, '0');
            const birthDay = String(Math.floor(seedRandom(seed + 6) * 28) + 1).padStart(2, '0');
            const dob = `${birthYear}-${birthMonth}-${birthDay}`;

            const height = isMale 
                ? Math.floor(seedRandom(seed + 7) * 25) + 168  // 168 ~ 192 cm
                : Math.floor(seedRandom(seed + 7) * 22) + 155; // 155 ~ 176 cm
            
            const weight = isMale
                ? Math.floor(seedRandom(seed + 8) * 35) + 62   // 62 ~ 96 kg
                : Math.floor(seedRandom(seed + 8) * 25) + 45;  // 45 ~ 69 kg

            const bodyType = BODY_TYPES[Math.floor(seedRandom(seed + 9) * BODY_TYPES.length)];
            
            // Randomly select 1 to 3 special skills
            const skillsCount = Math.floor(seedRandom(seed + 10) * 3) + 1;
            const skills = [];
            const tempSkills = [...SKILLS_LIST];
            for (let i = 0; i < skillsCount; i++) {
                const index = Math.floor(seedRandom(seed + 11 + i) * tempSkills.length);
                skills.push(tempSkills[index]);
                tempSkills.splice(index, 1);
            }

            const phone = `010-${String(Math.floor(seedRandom(seed + 12) * 9000) + 1000)}-${String(Math.floor(seedRandom(seed + 13) * 9000) + 1000)}`;
            const email = `${givenName.toLowerCase()}${birthYear % 100}@mail.com`;
            const sns = `@${givenName.toLowerCase()}_official`;

            // Filmography: 0 to 4 items
            const filmCount = Math.floor(seedRandom(seed + 14) * 5);
            const filmography = [];
            const tempFilms = [...FILMOGRAPHY_EXAMPLES];
            for(let i=0; i<filmCount; i++){
                const index = Math.floor(seedRandom(seed + 15 + i) * tempFilms.length);
                filmography.push(tempFilms[index]);
                tempFilms.splice(index, 1);
            }

            // Collaboration history
            const collabCount = Math.floor(seedRandom(seed + 16) * 4);
            const collabHistory = [];
            for (let i = 0; i < collabCount; i++) {
                const project = PROJECTS_LIST[Math.floor(seedRandom(seed + 17 + i) * PROJECTS_LIST.length)];
                const role = ROLES_LIST[Math.floor(seedRandom(seed + 18 + i) * ROLES_LIST.length)];
                collabHistory.push({ project, role, date: `${currentYear - 1 - i}-0${i + 1}-15` });
            }

            // Profile photo placeholder
            const photoUrl = isMale 
                ? `https://images.unsplash.com/photo-${[
                    '1500648767791-00dcc994a43e', '1507003211169-0a1dd7228f2d', '1539571696357-5a69c17a67c6',
                    '1492562080023-ab3db95bfbce', '1506794778202-cad84cf45f1d', '1519085360753-af0119f7cbe7'
                  ][id % 6]}?w=150&h=150&fit=crop&crop=faces`
                : `https://images.unsplash.com/photo-${[
                    '1494790108377-be9c29b29330', '1438761681033-6461ffad8d80', '1544005313-94ddf0286df2',
                    '1534528741775-53994a69daeb', '1517841905240-472988babdf9', '1554151228-14d9def656e4'
                  ][id % 6]}?w=150&h=150&fit=crop&crop=faces`;

            return {
                id: `ACT-${String(id).padStart(5, '0')}`,
                numericId: id,
                name,
                isMale,
                gender: isMale ? "남성" : "여성",
                dob,
                age,
                phone,
                email,
                sns,
                photoUrl,
                height,
                weight,
                bodyType,
                skills,
                filmography,
                collabHistory,
                ndaSigned: seedRandom(seed + 19) > 0.4
            };
        };

        // Generates 30 initial records
        const INITIAL_ACTORS = Array.from({ length: 30 }, (_, i) => generateMockActor(i + 1));

        // Initial NDAs linked to initial actors
        const INITIAL_NDAS = [];
        INITIAL_ACTORS.forEach((actor, index) => {
            if (actor.ndaSigned) {
                const project = PROJECTS_LIST[index % PROJECTS_LIST.length];
                INITIAL_NDAS.push({
                    id: `NDA-${String(100 + index).padStart(5, '0')}`,
                    actorId: actor.id,
                    actorName: actor.name,
                    projectName: project,
                    status: 'signed',
                    sentDate: '2026-05-10',
                    signedDate: '2026-05-12',
                    hash: 'sha256-' + Math.random().toString(16).substring(2, 10).toUpperCase() + '...'
                });
            } else if (index % 4 === 0) {
                const project = PROJECTS_LIST[index % PROJECTS_LIST.length];
                INITIAL_NDAS.push({
                    id: `NDA-${String(100 + index).padStart(5, '0')}`,
                    actorId: actor.id,
                    actorName: actor.name,
                    projectName: project,
                    status: 'sent',
                    sentDate: '2026-06-25',
                    signedDate: '',
                    hash: ''
                });
            }
        });

        // App Component
        function App() {
            const [theme, setTheme] = useState('dark');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [actors, setActors] = useState(INITIAL_ACTORS);
            const [ndas, setNdas] = useState(INITIAL_NDAS);
            const [projects, setProjects] = useState(PROJECTS_LIST);

            const handleAddProject = (newProj) => {
                if (!newProj || !newProj.trim()) return false;
                const trimmed = newProj.trim();
                if (projects.includes(trimmed)) {
                    alert("이미 존재하는 작품명입니다.");
                    return false;
                }
                setProjects(prev => [...prev, trimmed]);
                addLog('작품 등록', `새로운 작품 [${trimmed}]을 시스템에 직접 등록했습니다.`);
                return trimmed;
            };
            const [logs, setLogs] = useState([
                { id: 1, time: '13:40:02', user: '관리자(Admin)', type: '로그인', desc: '관리자 대시보드 로그인 성공' },
                { id: 2, time: '13:42:15', user: '관리자(Admin)', type: '보안', desc: '배우 데이터베이스 암호화 채널 로드' }
            ]);

            // Detailed Panel State
            const [selectedActorId, setSelectedActorId] = useState(null);
            const [isDetailOpen, setIsDetailOpen] = useState(false);

            // Modals
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [isEditModalOpen, setIsEditModalOpen] = useState(false);
            const [actorToEdit, setActorToEdit] = useState(null);

            // Decryption state for sensitive data
            const [decryptedFields, setDecryptedFields] = useState({});

            // Theme toggle execution
            useEffect(() => {
                const root = window.document.documentElement;
                if (theme === 'dark') {
                    root.classList.add('dark');
                } else {
                    root.classList.remove('dark');
                }
            }, [theme]);

            // Add Security Log Helper
            const addLog = (type, desc) => {
                const now = new Date();
                const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
                setLogs(prev => [
                    { id: Date.now(), time: timeStr, user: '관리자(Admin)', type, desc },
                    ...prev.slice(0, 49) // Keep last 50 logs
                ]);
            };

            const toggleTheme = () => {
                const nextTheme = theme === 'dark' ? 'light' : 'dark';
                setTheme(nextTheme);
                addLog('환경설정', `UI 테마 변경: ${nextTheme === 'dark' ? '다크 모드' : '라이트 모드'}`);
            };

            const handleActorClick = (id) => {
                setSelectedActorId(id);
                setIsDetailOpen(true);
            };

            // Masked data view toggle
            const revealSensitiveData = (actorId, field) => {
                const key = `${actorId}-${field}`;
                setDecryptedFields(prev => ({
                    ...prev,
                    [key]: !prev[key]
                }));
                if (!decryptedFields[key]) {
                    const actorName = actors.find(a => a.id === actorId)?.name || actorId;
                    addLog('개인정보 접근', `배우 [${actorName}]의 민감정보(${field === 'phone' ? '연락처' : '이메일'})를 조회했습니다.`);
                }
            };

            return (
                <div className="flex h-screen overflow-hidden bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 font-sans transition-colors duration-300">
                    
                    {/* Left Sidebar Navigation */}
                    <aside className="w-64 flex-shrink-0 bg-white dark:bg-[#0c0c0f] border-r border-zinc-200 dark:border-zinc-800 flex flex-col justify-between z-20">
                        <div>
                            {/* Logo Row */}
                            <div className="h-16 px-6 border-b border-zinc-200 dark:border-zinc-800 flex items-center gap-3">
                                <div className="p-2 bg-blue-600 rounded-lg text-white">
                                    <Icons.Shield className="w-6 h-6" />
                                </div>
                                <div>
                                    <h1 className="text-lg font-bold tracking-tight text-zinc-900 dark:text-zinc-50">CastFlow</h1>
                                    <p className="text-xs text-zinc-500">배우 및 NDA 보안 관리</p>
                                </div>
                            </div>

                            {/* Nav List */}
                            <nav className="p-4 space-y-1">
                                <button
                                    onClick={() => { setActiveTab('dashboard'); setIsDetailOpen(false); }}
                                    className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors ${
                                        activeTab === 'dashboard'
                                            ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400'
                                            : 'text-zinc-600 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-900'
                                    }`}
                                >
                                    <Icons.Dashboard className="w-5 h-5" />
                                    대시보드
                                </button>
                                <button
                                    onClick={() => setActiveTab('actors')}
                                    className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors ${
                                        activeTab === 'actors'
                                            ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400'
                                            : 'text-zinc-600 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-900'
                                    }`}
                                >
                                    <Icons.Users className="w-5 h-5" />
                                    배우 데이터베이스
                                </button>
                                <button
                                    onClick={() => setActiveTab('nda')}
                                    className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors ${
                                        activeTab === 'nda'
                                            ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400'
                                            : 'text-zinc-600 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-900'
                                    }`}
                                >
                                    <Icons.FileText className="w-5 h-5" />
                                    NDA 및 보안 서약
                                </button>
                                <button
                                    onClick={() => setActiveTab('import')}
                                    className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors ${
                                        activeTab === 'import'
                                            ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400'
                                            : 'text-zinc-600 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-900'
                                    }`}
                                >
                                    <Icons.Upload className="w-5 h-5" />
                                    일괄 등록 (CSV)
                                </button>
                                <button
                                    onClick={() => setActiveTab('security')}
                                    className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors ${
                                        activeTab === 'security'
                                            ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400'
                                            : 'text-zinc-600 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-900'
                                    }`}
                                >
                                    <Icons.Shield className="w-5 h-5" />
                                    보안 감사 로그
                                </button>
                            </nav>
                        </div>

                        {/* Sidebar Bottom */}
                        <div className="p-4 border-t border-zinc-200 dark:border-zinc-800 space-y-3">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 rounded-full bg-blue-500 text-white flex items-center justify-center font-bold text-sm shadow-sm">
                                    관
                                </div>
                                <div>
                                    <h4 className="text-xs font-semibold text-zinc-900 dark:text-zinc-200">김관리 (마스터)</h4>
                                    <p className="text-[10px] text-zinc-500">GCP 보안 채널 접속 중</p>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button
                                    onClick={toggleTheme}
                                    className="flex-1 py-1.5 px-3 bg-zinc-100 dark:bg-zinc-900 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-md text-xs font-medium flex items-center justify-center gap-2 border border-zinc-200 dark:border-zinc-800 transition-colors"
                                >
                                    {theme === 'dark' ? (
                                        <>
                                            <Icons.Sun className="w-3.5 h-3.5 text-amber-500" />
                                            라이트 모드
                                        </>
                                    ) : (
                                        <>
                                            <Icons.Moon className="w-3.5 h-3.5 text-indigo-500" />
                                            다크 모드
                                        </>
                                    )}
                                </button>
                            </div>
                        </div>
                    </aside>

                    {/* Main Container */}
                    <div className="flex-1 flex flex-col min-w-0 overflow-hidden relative">
                        {/* Top Bar */}
                        <header className="h-16 bg-white dark:bg-[#0c0c0f] border-b border-zinc-200 dark:border-zinc-800 flex items-center justify-between px-6 z-10">
                            <div>
                                <span className="text-xs font-semibold px-2.5 py-0.5 bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 rounded-full border border-emerald-500/20">
                                    보안 채널 활성화
                                </span>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="text-xs text-zinc-500">
                                    최종 시스템 업데이트: <span className="font-mono">2026-06-30 13:45</span>
                                </div>
                                <div className="h-4 w-px bg-zinc-200 dark:bg-zinc-800" />
                                <span className="text-xs font-medium text-zinc-600 dark:text-zinc-400">
                                    보조출연 에이전시 전용
                                </span>
                            </div>
                        </header>

                        {/* Content Area */}
                        <main className="flex-1 overflow-y-auto p-6">
                            {activeTab === 'dashboard' && (
                                <DashboardView 
                                    actors={actors} 
                                    ndas={ndas} 
                                    projects={projects} 
                                    setActiveTab={setActiveTab} 
                                    setActors={setActors}
                                    addLog={addLog}
                                />
                            )}
                            {activeTab === 'actors' && (
                                <ActorsView 
                                    actors={actors} 
                                    setActors={setActors}
                                    ndas={ndas}
                                    setNdas={setNdas}
                                    onActorClick={handleActorClick} 
                                    setIsAddModalOpen={setIsAddModalOpen}
                                    setIsEditModalOpen={setIsEditModalOpen}
                                    setActorToEdit={setActorToEdit}
                                    revealSensitiveData={revealSensitiveData}
                                    decryptedFields={decryptedFields}
                                    addLog={addLog}
                                    projects={projects}
                                    onAddProject={handleAddProject}
                                />
                            )}
                            {activeTab === 'nda' && (
                                <NdaView 
                                    ndas={ndas} 
                                    setNdas={setNdas}
                                    actors={actors}
                                    setActors={setActors}
                                    projects={projects}
                                    setProjects={setProjects}
                                    addLog={addLog}
                                />
                            )}
                            {activeTab === 'import' && (
                                <ImportView 
                                    setActors={setActors} 
                                    addLog={addLog}
                                />
                            )}
                            {activeTab === 'security' && (
                                <SecurityView 
                                    logs={logs} 
                                    addLog={addLog}
                                />
                            )}
                        </main>

                        {/* Actor Detail Drawer Side Panel */}
                        <ActorDetailPanel 
                            isOpen={isDetailOpen} 
                            onClose={() => setIsDetailOpen(false)} 
                            actorId={selectedActorId} 
                            actors={actors}
                            setActors={setActors}
                            ndas={ndas}
                            setNdas={setNdas}
                            revealSensitiveData={revealSensitiveData}
                            decryptedFields={decryptedFields}
                            projects={projects}
                            setProjects={setProjects}
                            addLog={addLog}
                        />
                    </div>

                    {/* Manual CRUD Modals */}
                    {isAddModalOpen && (
                        <ActorFormModal 
                            onClose={() => setIsAddModalOpen(false)} 
                            onSave={(newActor) => {
                                setActors(prev => [newActor, ...prev]);
                                addLog('배우 등록', `새 배우 [${newActor.name}] 프로필이 생성되었습니다.`);
                                setIsAddModalOpen(false);
                            }}
                            projects={projects}
                        />
                    )}

                    {isEditModalOpen && (
                        <ActorFormModal 
                            actor={actorToEdit}
                            onClose={() => {
                                setIsEditModalOpen(false);
                                setActorToEdit(null);
                            }} 
                            onSave={(updatedActor) => {
                                setActors(prev => prev.map(a => a.id === updatedActor.id ? updatedActor : a));
                                addLog('배우 수정', `배우 [${updatedActor.name}] 프로필 정보를 업데이트했습니다.`);
                                setIsEditModalOpen(false);
                                setActorToEdit(null);
                            }}
                            projects={projects}
                        />
                    )}

                </div>
            );
        }

        // ==========================================
        // SUBCOMPONENT: DashboardView
        // ==========================================
        function DashboardView({ actors, ndas, projects, setActiveTab, setActors, addLog }) {
            const stats = useMemo(() => {
                const total = actors.length;
                const totalHeight = actors.reduce((acc, a) => acc + a.height, 0);
                const avgHeight = total > 0 ? (totalHeight / total).toFixed(1) : 0;
                
                const totalAge = actors.reduce((acc, a) => acc + a.age, 0);
                const avgAge = total > 0 ? (totalAge / total).toFixed(1) : 0;

                const signedNdaCount = actors.filter(a => a.ndaSigned).length;
                const ndaRate = total > 0 ? ((signedNdaCount / total) * 100).toFixed(1) : 0;

                return { total, avgHeight, avgAge, ndaRate, signedNdaCount };
            }, [actors]);

            // Skills statistics
            const skillStats = useMemo(() => {
                const counts = {};
                actors.forEach(actor => {
                    actor.skills.forEach(skill => {
                        counts[skill] = (counts[skill] || 0) + 1;
                    });
                });
                return Object.entries(counts)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 5);
            }, [actors]);

            // Age brackets
            const ageBrackets = useMemo(() => {
                let brackets = { '10~20대': 0, '30대': 0, '40대': 0, '50대 이상': 0 };
                actors.forEach(actor => {
                    if (actor.age < 30) brackets['10~20대']++;
                    else if (actor.age < 40) brackets['30대']++;
                    else if (actor.age < 50) brackets['40대']++;
                    else brackets['50대 이상']++;
                });
                return brackets;
            }, [actors]);

            const loadBulkData = () => {
                // Generates 1,200 mock actors for test
                const bigBatch = Array.from({ length: 1200 }, (_, i) => generateMockActor(i + 100));
                setActors(prev => {
                    const existingNonMock = prev.filter(a => parseInt(a.id.replace('ACT-', '')) < 100);
                    return [...existingNonMock, ...bigBatch];
                });

                // Generate random NDAs for the new batch
                const newNdas = [];
                bigBatch.forEach((actor, index) => {
                    if (actor.ndaSigned) {
                        const project = projects[index % projects.length];
                        newNdas.push({
                            id: `NDA-${String(500 + index).padStart(5, '0')}`,
                            actorId: actor.id,
                            actorName: actor.name,
                            projectName: project,
                            status: 'signed',
                            sentDate: '2026-06-01',
                            signedDate: '2026-06-03',
                            hash: 'sha256-' + Math.random().toString(16).substring(2, 10).toUpperCase() + '...'
                        });
                    }
                });
                
                addLog('데이터 일괄 로드', '대용량 시뮬레이션용 데이터 1,200건을 데이터베이스에 적재 완료했습니다.');
            };

            return (
                <div className="space-y-6">
                    {/* Header Action */}
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <h2 className="text-2xl font-bold tracking-tight text-zinc-950 dark:text-zinc-50">시스템 대시보드</h2>
                            <p className="text-zinc-500 text-sm">보조출연자 데이터베이스 상태 및 보안 규정 준수 현황</p>
                        </div>
                        <div className="flex gap-2">
                            <button
                                onClick={loadBulkData}
                                className="bg-blue-600 hover:bg-blue-700 text-white rounded-lg px-4 py-2 text-sm font-semibold transition-colors shadow-sm flex items-center gap-2"
                            >
                                <Icons.Refresh className="w-4 h-4" />
                                1,200명 대용량 테스트 데이터 탑재
                            </button>
                        </div>
                    </div>

                    {/* KPI Cards Grid */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="bg-white dark:bg-[#0c0c0f] border border-zinc-200 dark:border-zinc-800 rounded-xl p-5 shadow-sm">
                            <div className="flex justify-between items-start">
                                <span className="text-zinc-500 dark:text-zinc-400 text-sm font-medium">등록된 총 배우 수</span>
                                <span className="p-2 bg-blue-500/10 text-blue-600 rounded-lg">
                                    <Icons.Users className="w-5 h-5" />
                                </span>
                            </div>
                            <div className="mt-3">
                                <h3 className="text-3xl font-extrabold text-zinc-950 dark:text-zinc-50 font-mono">
                                    {stats.total.toLocaleString()}명
                                </h3>
                                <p className="text-xs text-zinc-500 mt-1">에이전시 전체 풀 소속</p>
                            </div>
                        </div>

                        <div className="bg-white dark:bg-[#0c0c0f] border border-zinc-200 dark:border-zinc-800 rounded-xl p-5 shadow-sm">
                            <div className="flex justify-between items-start">
                                <span className="text-zinc-500 dark:text-zinc-400 text-sm font-medium">NDA 서약 준수율</span>
                                <span className="p-2 bg-emerald-500/10 text-emerald-600 rounded-lg">
                                    <Icons.CheckCircle className="w-5 h-5" />
                                </span>
                            </div>
                            <div className="mt-3">
                                <div className="flex items-baseline gap-2">
                                    <h3 className="text-3xl font-extrabold text-zinc-950 dark:text-zinc-50 font-mono">
                                        {stats.ndaRate}%
                                    </h3>
                                    <span className="text-xs font-semibold text-emerald-600 dark:text-emerald-400">
                                        ({stats.signedNdaCount}명 서명 완료)
                                    </span>
                                </div>
                                <div className="w-full bg-zinc-200 dark:bg-zinc-800 h-1.5 rounded-full mt-2 overflow-hidden">
                                    <div className="bg-emerald-500 h-1.5" style={{ width: `${stats.ndaRate}%` }}></div>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white dark:bg-[#0c0c0f] border border-zinc-200 dark:border-zinc-800 rounded-xl p-5 shadow-sm">
                            <div className="flex justify-between items-start">
                                <span className="text-zinc-500 dark:text-zinc-400 text-sm font-medium">배우 평균 연령</span>
                                <span className="p-2 bg-amber-500/10 text-amber-600 rounded-lg">
                                    <Icons.Clock className="w-5 h-5" />
                                </span>
                            </div>
                            <div className="mt-3">
                                <h3 className="text-3xl font-extrabold text-zinc-950 dark:text-zinc-50 font-mono">
                                    {stats.avgAge}세
                                </h3>
                                <p className="text-xs text-zinc-500 mt-1">생년월일 실시간 환산 기준</p>
                            </div>
                        </div>

                        <div className="bg-white dark:bg-[#0c0c0f] border border-zinc-200 dark:border-zinc-800 rounded-xl p-5 shadow-sm">
                            <div className="flex justify-between items-start">
                                <span className="text-zinc-500 dark:text-zinc-400 text-sm font-medium">평균 신장 (Height)</span>
                                <span className="p-2 bg-indigo-500/10 text-indigo-600 rounded-lg font-bold text-xs">
                                    cm
                                </span>
                            </div>
                            <div className="mt-3">
                                <h3 className="text-3xl font-extrabold text-zinc-950 dark:text-zinc-50 font-mono">
                                    {stats.avgHeight} cm
                                </h3>
                                <p className="text-xs text-zinc-500 mt-1">의상 및 캐스팅 기본 지표</p>
                            </div>
                        </div>
                    </div>

                    {/* Middle Charts & Data Panels */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        
                        {/* Skill Top Lists */}
                        <div className="bg-white dark:bg-[#0c0c0f] border border-zinc-200 dark:border-zinc-800 rounded-xl p-6 shadow-sm flex flex-col justify-between">
                            <div>
                                <h3 className="text-base font-bold text-zinc-900 dark:text-zinc-100 mb-4">보유 배우 많은 특기 TOP 5</h3>
                                <div className="space-y-3">
                                    {skillStats.map(([skill, count], idx) => {
                                        const percentage = ((count / actors.length) * 100).toFixed(1);
                                        return (
                                            <div key={skill} className="space-y-1">
                                                <div className="flex justify-between text-xs font-semibold">
                                                    <span>{idx + 1}. {skill}</span>
                                                    <span className="text-zinc-500">{count}명 ({percentage}%)</span>
                                                </div>
                                                <div className="w-full bg-zinc-100 dark:bg-zinc-800 h-2 rounded-full overflow-hidden">
                                                    <div className="bg-blue-500 h-2 rounded-full" style={{ width: `${percentage}%` }} />
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                            <button
                                onClick={() => setActiveTab('actors')}
                                className="mt-4 text-xs font-semibold text-blue-500 hover:text-blue-600 hover:underline inline-flex items-center gap-1.5"
                            >
                                상세 필터링하여 찾기 <Icons.ChevronRight className="w-3.5 h-3.5" />
                            </button>
                        </div>

                        {/* Age brackets bar chart */}
                        <div className="bg-white dark:bg-[#0c0c0f] border border-zinc-200 dark:border-zinc-800 rounded-xl p-6 shadow-sm flex flex-col justify-between">
                            <div>
                                <h3 className="text-base font-bold text-zinc-900 dark:text-zinc-100 mb-4">연령대별 배우 분포</h3>
                                <div className="space-y-3">
                                    {Object.entries(ageBrackets).map(([bracket, count]) => {
                                        const percentage = ((count / actors.length) * 100).toFixed(1);
                                        return (
                                            <div key={bracket} className="flex items-center gap-3">
                                                <span className="w-20 text-xs font-medium text-zinc-500">{bracket}</span>
                                                <div className="flex-1 bg-zinc-100 dark:bg-zinc-800 h-5 rounded overflow-hidden relative">
                                                    <div className="bg-indigo-500/20 dark:bg-indigo-500/30 h-full transition-all" style={{ width: `${percentage}%` }} />
                                                    <span className="absolute inset-y-0 left-2 flex items-center text-[10px] font-bold font-mono text-indigo-700 dark:text-indigo-300">
                                                        {count}명
                                                    </span>
                                                </div>
                                                <span className="text-xs font-bold text-zinc-700 dark:text-zinc-300 w-10 text-right">{percentage}%</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                            <p className="text-[10px] text-zinc-500 mt-2">출연진 연령 조율 시 상기 분포를 참고하십시오.</p>
                        </div>

                        {/* Project NDA Compliance lists */}
                        <div className="bg-white dark:bg-[#0c0c0f] border border-zinc-200 dark:border-zinc-800 rounded-xl p-6 shadow-sm">
                            <h3 className="text-base font-bold text-zinc-900 dark:text-zinc-100 mb-4">프로젝트별 기밀서약(NDA) 체결율</h3>
                            <div className="space-y-3 max-h-[220px] overflow-y-auto pr-1">
                                {projects.map((project, idx) => {
                                    // Calculate rate of signed ndas for this project
                                    const projectNdas = ndas.filter(n => n.projectName === project);
                                    const total = projectNdas.length;
                                    const signed = projectNdas.filter(n => n.status === 'signed').length;
                                    const rate = total > 0 ? ((signed / total) * 100).toFixed(0) : 100; // default 100 if no actor assigned
                                    
                                    let rateColor = "bg-emerald-500";
                                    let textColor = "text-emerald-600 dark:text-emerald-400";
                                    if (rate < 50) {
                                        rateColor = "bg-rose-500";
                                        textColor = "text-rose-600 dark:text-rose-400";
                                    } else if (rate < 85) {
                                        rateColor = "bg-amber-500";
                                        textColor = "text-amber-600 dark:text-amber-400";
                                    }

                                    return (
                                        <div key={project} className="flex justify-between items-center py-1.5 border-b border-zinc-100 dark:border-zinc-800 last:border-0">
                                            <div className="min-w-0 flex-1 pr-3">
                                                <p className="text-xs font-semibold truncate text-zinc-800 dark:text-zinc-200">{project}</p>
                                                <p className="text-[10px] text-zinc-500">배정 인원: {total}명 / 서명 완료: {signed}명</p>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <div className="w-16 bg-zinc-100 dark:bg-zinc-800 h-1.5 rounded-full overflow-hidden">
                                                    <div className={`${rateColor} h-1.5`} style={{ width: `${rate}%` }} />
                                                </div>
                                                <span className={`text-xs font-bold font-mono ${textColor} w-10 text-right`}>{rate}%</span>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                    </div>

                    {/* Notice card for system safety */}
                    <div className="bg-blue-50 dark:bg-blue-950/20 border border-blue-200 dark:border-blue-800/40 rounded-xl p-4 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                        <div className="flex gap-3">
                            <span className="p-2 bg-blue-500/10 text-blue-600 rounded-lg flex-shrink-0">
                                <Icons.Shield className="w-5 h-5" />
                            </span>
                            <div>
                                <h4 className="text-sm font-semibold text-blue-800 dark:text-blue-300">개인정보 보호 관련 안내</h4>
                                <p className="text-xs text-blue-600/90 dark:text-blue-400/90 mt-0.5">
                                    본 시스템에 저장된 배우의 휴대전화번호, 이메일은 정보보호 규정에 따라 마스킹 처리되어 있습니다. 상세 보기 및 마스킹 해제는 감사 로그에 기록됩니다.
                                </p>
                            </div>
                        </div>
                        <button
                            onClick={() => setActiveTab('security')}
                            className="text-xs font-semibold bg-white dark:bg-zinc-900 border border-blue-300 dark:border-blue-800 text-blue-600 dark:text-blue-300 px-3.5 py-1.5 rounded-lg hover:bg-blue-50 dark:hover:bg-zinc-800 transition-colors shadow-xs"
                        >
                            감사로그 열람
                        </button>
                    </div>

                </div>
            );
        }

        // ==========================================
        // SUBCOMPONENT: ActorsView
        // ==========================================
        function ActorsView({ 
            actors, 
            setActors, 
            ndas, 
            setNdas, 
            onActorClick, 
            setIsAddModalOpen, 
            setIsEditModalOpen, 
            setActorToEdit,
            revealSensitiveData,
            decryptedFields,
            addLog,
            projects,
            onAddProject
        }) {
            // View Mode State
            const [viewMode, setViewMode] = useState('table'); // 'grid' or 'table'
            
            // Search / Filter / Pagination States
            const [search, setSearch] = useState('');
            const [genderFilter, setGenderFilter] = useState('');
            const [bodyTypeFilter, setBodyTypeFilter] = useState('');
            const [selectedSkills, setSelectedSkills] = useState([]);
            const [heightRange, setHeightRange] = useState({ min: 140, max: 200 });
            const [ageRange, setAgeRange] = useState({ min: 18, max: 70 });
            const [ndaFilter, setNdaFilter] = useState(''); // 'signed', 'unsigned'

            // Sorting
            const [sortBy, setSortBy] = useState('name');
            const [sortOrder, setSortOrder] = useState('asc');

            // Pagination
            const [currentPage, setCurrentPage] = useState(1);
            const itemsPerPage = 15;

            // Open filter panel toggler
            const [showAdvFilters, setShowAdvFilters] = useState(false);

            // NEW: Multiple Actor Selection & Project-Specific NDA Inspection
            const [selectedActorIds, setSelectedActorIds] = useState([]);
            const [batchNdaProject, setBatchNdaProject] = useState(projects[0]);
            const [inspectProject, setInspectProject] = useState(projects[0]);

            // Handle skill selection toggler
            const handleSkillToggle = (skill) => {
                setSelectedSkills(prev => 
                    prev.includes(skill) ? prev.filter(s => s !== skill) : [...prev, skill]
                );
            };

            // Reset all filters
            const resetFilters = () => {
                setSearch('');
                setGenderFilter('');
                setBodyTypeFilter('');
                setSelectedSkills([]);
                setHeightRange({ min: 140, max: 200 });
                setAgeRange({ min: 18, max: 70 });
                setNdaFilter('');
                setCurrentPage(1);
                setSelectedActorIds([]);
                setInspectProject(projects[0]);
                addLog('필터 초기화', '검색 필터를 모두 기본값으로 리셋했습니다.');
            };

            // Filter and Sort calculation
            const filteredActors = useMemo(() => {
                let list = [...actors];

                // 1. Text search
                if (search.trim()) {
                    const q = search.toLowerCase().trim();
                    list = list.filter(actor => 
                        actor.name.toLowerCase().includes(q) ||
                        actor.skills.some(s => s.toLowerCase().includes(q)) ||
                        actor.filmography.some(f => f.toLowerCase().includes(q)) ||
                        actor.id.toLowerCase().includes(q)
                    );
                }

                // 2. Gender filter
                if (genderFilter) {
                    list = list.filter(actor => actor.gender === genderFilter);
                }

                // 3. Body Type filter
                if (bodyTypeFilter) {
                    list = list.filter(actor => actor.bodyType === bodyTypeFilter);
                }

                // 4. Height range filter
                list = list.filter(actor => actor.height >= heightRange.min && actor.height <= heightRange.max);

                // 5. Age range filter
                list = list.filter(actor => actor.age >= ageRange.min && actor.age <= ageRange.max);

                // 6. Skills filter (all selected must be present)
                if (selectedSkills.length > 0) {
                    list = list.filter(actor => 
                        selectedSkills.every(skill => actor.skills.includes(skill))
                    );
                }

                // 7. NDA status filter for the inspected project
                if (ndaFilter === 'signed') {
                    list = list.filter(actor => {
                        const ndaObj = ndas.find(n => n.actorId === actor.id && n.projectName === inspectProject);
                        return ndaObj && ndaObj.status === 'signed';
                    });
                } else if (ndaFilter === 'unsigned') {
                    list = list.filter(actor => {
                        const ndaObj = ndas.find(n => n.actorId === actor.id && n.projectName === inspectProject);
                        return !ndaObj || ndaObj.status !== 'signed';
                    });
                }

                // 8. Sorting
                list.sort((a, b) => {
                    let valA, valB;
                    if (sortBy === 'name') {
                        valA = a.name;
                        valB = b.name;
                        return sortOrder === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
                    } else if (sortBy === 'height') {
                        valA = a.height;
                        valB = b.height;
                    } else if (sortBy === 'age') {
                        valA = a.age;
                        valB = b.age;
                    } else if (sortBy === 'collab') {
                        valA = a.collabHistory.length;
                        valB = b.collabHistory.length;
                    }

                    if (valA < valB) return sortOrder === 'asc' ? -1 : 1;
                    if (valA > valB) return sortOrder === 'asc' ? 1 : -1;
                    return 0;
                });

                return list;
            }, [actors, search, genderFilter, bodyTypeFilter, selectedSkills, heightRange, ageRange, ndaFilter, sortBy, sortOrder, inspectProject, ndas]);

            // Pagination calculation
            const paginatedActors = useMemo(() => {
                const start = (currentPage - 1) * itemsPerPage;
                return filteredActors.slice(start, start + itemsPerPage);
            }, [filteredActors, currentPage]);

            const totalPages = Math.ceil(filteredActors.length / itemsPerPage) || 1;

            // Trigger reset of page and selections when filters change
            useEffect(() => {
                setCurrentPage(1);
                setSelectedActorIds([]);
            }, [search, genderFilter, bodyTypeFilter, selectedSkills, heightRange, ageRange, ndaFilter, sortBy, sortOrder, inspectProject]);

            // CRUD delete handler
            const handleDeleteActor = (id, name, e) => {
                e.stopPropagation();
                if (confirm(`[${name}] 배우를 데이터베이스에서 영구 삭제하시겠습니까? 관련 계약 및 협업 기록이 파기됩니다.`)) {
                    setActors(prev => prev.filter(a => a.id !== id));
                    setNdas(prev => prev.filter(n => n.actorId !== id));
                    addLog('배우 삭제', `배우 [${name}]의 프로필이 완전 삭제되었습니다.`);
                }
            };

            // Multi Send NDA Handler
            const handleBatchNdaSendFromDatabase = () => {
                const newNdaRecords = [];
                const alreadySentNames = [];
                
                selectedActorIds.forEach(actorId => {
                    const actorObj = actors.find(a => a.id === actorId);
                    const exists = ndas.some(n => n.actorId === actorId && n.projectName === batchNdaProject);
                    if (exists) {
                        alreadySentNames.push(actorObj?.name || actorId);
                    } else {
                        newNdaRecords.push({
                            id: `NDA-${String(Math.floor(Math.random() * 90000) + 10000)}`,
                            actorId,
                            actorName: actorObj?.name || '알수없음',
                            projectName: batchNdaProject,
                            status: 'sent',
                            sentDate: new Date().toISOString().split('T')[0],
                            signedDate: '',
                            hash: ''
                        });
                    }
                });

                if (newNdaRecords.length > 0) {
                    setNdas(prev => [...newNdaRecords, ...prev]);
                    addLog('NDA 일괄 발송', `배우 데이터베이스에서 [${batchNdaProject}] 작품에 대하여 배우 ${newNdaRecords.length}명에게 NDA 서약서를 일괄 전송했습니다.`);
                }

                let alertMsg = `선택한 배우들에게 [${batchNdaProject}] 서약서 발송이 완료되었습니다.`;
                if (alreadySentNames.length > 0) {
                    alertMsg += `\n(이미 해당 작품 서약서가 생성된 배우 ${alreadySentNames.length}명 제외: ${alreadySentNames.join(', ')})`;
                }
                alert(alertMsg);
                setSelectedActorIds([]);
            };

            return (
                <div className="space-y-6">
                    {/* Header Controls */}
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div>
                            <h2 className="text-2xl font-bold tracking-tight text-zinc-950 dark:text-zinc-50">배우 데이터베이스</h2>
                            <p className="text-zinc-500 text-sm">에이전시 전체 풀 검색 및 상세 조건 프로필 관리</p>
                        </div>
                        <div className="flex gap-2">
                            <button
                                onClick={() => setIsAddModalOpen(true)}
                                className="bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg px-4 py-2 text-sm font-semibold transition-colors shadow-sm flex items-center gap-2"
                            >
                                <Icons.Plus className="w-4 h-4" />
                                배우 신규 등록
                            </button>
                        </div>
                    </div>

                    {/* Search & Tool Bar */}
                    <div className="bg-white dark:bg-[#0c0c0f] border border-zinc-200 dark:border-zinc-800 rounded-xl p-4 shadow-sm space-y-4">
                        <div className="flex flex-col lg:flex-row gap-3">
                            {/* Text Input search */}
                            <div className="relative flex-1">
                                <span className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-zinc-400">
                                    <Icons.Search className="w-4 h-4" />
                                </span>
                                <input
                                    type="text"
                                    placeholder="이름, 특기, 출연 영화 등으로 통합 검색..."
                                    value={search}
                                    onChange={(e) => setSearch(e.target.value)}
                                    className="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-lg pl-9 pr-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50"
                                />
                            </div>

                            {/* Easy quick filters */}
                            <div className="flex flex-wrap gap-2 items-center">
                                {/* inspect project selector */}
                                <div className="flex items-center gap-1.5 bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-lg px-2.5 py-1.5">
                                    <span className="text-xs text-zinc-500 font-semibold whitespace-nowrap">서약 확인 작품:</span>
                                    <select
                                        value={inspectProject}
                                        onChange={(e) => setInspectProject(e.target.value)}
                                        className="bg-transparent text-xs font-bold text-blue-600 dark:text-blue-400 focus:outline-none cursor-pointer"
                                    >
                                        {projects.map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>
                                    <button
                                        type="button"
                                        onClick={() => {
                                            const newProj = prompt("등록할 새로운 대상 작품명을 입력하세요:");
                                            if (newProj && newProj.trim()) {
                                                const res = onAddProject(newProj);
                                                if (res) setInspectProject(res);
                                            }
                                        }}
                                        className="text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-200 ml-1"
                                        title="새 작품 직접 등록"
                                    >
                                        <Icons.Plus className="w-3 h-3" />
                                    </button>
                                </div>

                                <select
                                    value={genderFilter}
                                    onChange={(e) => setGenderFilter(e.target.value)}
                                    className="bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-lg px-3 py-2 text-sm focus:outline-none"
                                >
                                    <option value="">성별 전체</option>
                                    <option value="남성">남성</option>
                                    <option value="여성">여성</option>
                                </select>

                                <select
                                    value={ndaFilter}
                                    onChange={(e) => setNdaFilter(e.target.value)}
                                    className="bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-lg px-3 py-2 text-sm focus:outline-none"
                                >
                                    <option value="">NDA 상태 전체</option>
                                    <option value="signed">NDA 서명 완료</option>
                                    <option value="unsigned">NDA 미서명/대기</option>
                                </select>

                                <button
                                    onClick={() => setShowAdvFilters(!showAdvFilters)}
                                    className={`px-3.5 py-2 rounded-lg text-sm font-semibold border transition-colors flex items-center gap-1.5 ${
                                        showAdvFilters 
                                            ? 'bg-blue-50 border-blue-200 dark:bg-blue-900/20 dark:border-blue-800 text-blue-600 dark:text-blue-400' 
                                            : 'bg-zinc-50 border-zinc-200 dark:bg-zinc-900 dark:border-zinc-800 text-zinc-700 dark:text-zinc-300'
                                    }`}
                                >
                                    <Icons.Filter className="w-4 h-4" />
                                    고급 필터
                                    {selectedSkills.length > 0 && ` (${selectedSkills.length})`}
                                </button>

                                <button
                                    onClick={resetFilters}
                                    className="text-zinc-500 hover:text-zinc-700 dark:hover:text-zinc-300 text-xs font-semibold px-2 py-1"
                                >
                                    필터 초기화
                                </button>
                            </div>

                            {/* View Switcher */}
                            <div className="h-9 w-px bg-zinc-200 dark:bg-zinc-800 hidden lg:block" />

                            <div className="flex bg-zinc-100 dark:bg-zinc-900 p-0.5 rounded-lg border border-zinc-200 dark:border-zinc-800 self-start sm:self-auto">
                                <button
                                    onClick={() => setViewMode('table')}
                                    className={`px-3 py-1 rounded-md text-xs font-semibold transition-colors flex items-center gap-1 ${
                                        viewMode === 'table'
                                            ? 'bg-white dark:bg-zinc-800 text-zinc-900 dark:text-zinc-100 shadow-sm'
                                            : 'text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100'
                                    }`}
                                >
                                    테이블 뷰
                                </button>
                                <button
                                    onClick={() => setViewMode('grid')}
                                    className={`px-3 py-1 rounded-md text-xs font-semibold transition-colors flex items-center gap-1 ${
                                        viewMode === 'grid'
                                            ? 'bg-white dark:bg-zinc-800 text-zinc-900 dark:text-zinc-100 shadow-sm'
                                            : 'text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100'
                                    }`}
                                >
                                    카드 그리드
                                </button>
                            </div>
                        </div>

                        {/* Collapsible Advanced Filters Section */}
                        {showAdvFilters && (
                            <div className="border-t border-zinc-100 dark:border-zinc-800 pt-4 grid grid-cols-1 md:grid-cols-3 gap-6 animate-fadeIn">
                                {/* Height Slider */}
                                <div className="space-y-2">
                                    <label className="text-xs font-semibold text-zinc-500 block">신장 범위 (cm)</label>
                                    <div className="flex gap-2">
                                        <input
                                            type="number"
                                            value={heightRange.min}
                                            onChange={(e) => setHeightRange(prev => ({ ...prev, min: Number(e.target.value) }))}
                                            className="w-1/2 bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded px-2 py-1 text-xs"
                                            placeholder="최소"
                                        />
                                        <input
                                            type="number"
                                            value={heightRange.max}
                                            onChange={(e) => setHeightRange(prev => ({ ...prev, max: Number(e.target.value) }))}
                                            className="w-1/2 bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded px-2 py-1 text-xs"
                                            placeholder="최대"
                                        />
                                    </div>
                                    <p className="text-[10px] text-zinc-500">지정한 키 사이의 배우만 표시합니다.</p>
                                </div>

                                {/* Age Slider */}
                                <div className="space-y-2">
                                    <label className="text-xs font-semibold text-zinc-500 block">나이 범위 (세)</label>
                                    <div className="flex gap-2">
                                        <input
                                            type="number"
                                            value={ageRange.min}
                                            onChange={(e) => setAgeRange(prev => ({ ...prev, min: Number(e.target.value) }))}
                                            className="w-1/2 bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded px-2 py-1 text-xs"
                                            placeholder="최소"
                                        />
                                        <input
                                            type="number"
                                            value={ageRange.max}
                                            onChange={(e) => setAgeRange(prev => ({ ...prev, max: Number(e.target.value) }))}
                                            className="w-1/2 bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded px-2 py-1 text-xs"
                                            placeholder="최대"
                                        />
                                    </div>
                                    <p className="text-[10px] text-zinc-500">생년월일을 기준으로 환산된 나이 범위입니다.</p>
                                </div>

                                {/* Body Type select */}
                                <div className="space-y-2">
                                    <label className="text-xs font-semibold text-zinc-500 block">체형</label>
                                    <select
                                        value={bodyTypeFilter}
                                        onChange={(e) => setBodyTypeFilter(e.target.value)}
                                        className="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded px-2 py-1.5 text-xs focus:outline-none"
                                    >
                                        <option value="">체형 전체</option>
                                        {BODY_TYPES.map(b => <option key={b} value={b}>{b}</option>)}
                                    </select>
                                </div>

                                {/* Multi-select skill checkboxes (styled as pills) */}
                                <div className="col-span-1 md:col-span-3 space-y-2">
                                    <label className="text-xs font-semibold text-zinc-500 block">선택 특기 매칭 (다중 선택 시 교집합 필터)</label>
                                    <div className="flex flex-wrap gap-1.5 max-h-32 overflow-y-auto p-1.5 bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-850 rounded-lg">
                                        {SKILLS_LIST.map(skill => {
                                            const active = selectedSkills.includes(skill);
                                            return (
                                                <button
                                                    key={skill}
                                                    onClick={() => handleSkillToggle(skill)}
                                                    className={`px-2.5 py-1 rounded-full text-xs font-semibold border transition-all ${
                                                        active 
                                                            ? 'bg-blue-600 border-blue-600 text-white shadow-xs' 
                                                            : 'bg-white dark:bg-zinc-900 border-zinc-200 dark:border-zinc-800 text-zinc-600 dark:text-zinc-400 hover:border-zinc-300'
                                                    }`}
                                                >
                                                    {skill}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Actors Listing */}
                    <div className="bg-white dark:bg-[#0c0c0f] border border-zinc-200 dark:border-zinc-800 rounded-xl overflow-hidden shadow-sm flex flex-col">
                        
                        {/* Table Header Control Row (Sorting config) */}
