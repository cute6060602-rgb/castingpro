        // SUBCOMPONENT: ImportView (CSV/Excel Batch Import)
        // ==========================================
        function ImportView({ setActors, addLog }) {
            const [fileContent, setFileContent] = useState('');
            const [importResult, setImportResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [isDragging, setIsDragging] = useState(false);

            const handleDragOver = (e) => {
                e.preventDefault();
                setIsDragging(true);
            };

            const handleDragLeave = () => {
                setIsDragging(false);
            };

            // Sample CSV content generator for demo paste
            const sampleCsv = `이름,성별,생년월일,연락처,신장,체중,체형,특기,이메일,SNS,출연작
김연우,여성,1998-05-12,010-4567-8901,167,49,보통,일본어 회화,yeonwu98@mail.com,@yeonwu_act,오징어 게임
박태현,남성,1992-11-30,010-8901-2345,183,78,건장함,태권도 3단/검술,taehyun92@mail.com,@taehyun_park,범죄도시 4/베테랑
최수아,여성,2001-02-14,010-2345-6789,162,45,마름,현대무용/발레,sua_choi01@mail.com,@sua_dance,더 글로리/무빙
이준서,남성,1985-07-22,010-1234-8888,177,72,탄탄함,대형운전/액션,junseo85@mail.com,@junseo_lee,괴물/부산행`;

            const parseCsvData = (text) => {
                const lines = text.split('\n').filter(line => line.trim().length > 0);
                if (lines.length < 2) {
                    return { success: false, error: "데이터 행이 비어 있습니다." };
                }

                const headers = lines[0].split(',').map(h => h.trim());
                const importedList = [];
                const errors = [];

                for (let i = 1; i < lines.length; i++) {
                    const values = lines[i].split(',').map(v => v.trim());
                    if (values.length < headers.length) {
                        errors.push(`${i + 1}번 행: 데이터 열이 헤더 크기보다 모자랍니다.`);
                        continue;
                    }

                    // Field Mapping
                    const rowData = {};
                    headers.forEach((header, index) => {
                        rowData[header] = values[index];
                    });

                    // Validations
                    if (!rowData['이름']) { errors.push(`${i + 1}번 행: [이름] 필드가 누락되었습니다.`); continue; }
                    if (!rowData['생년월일']) { errors.push(`${i + 1}번 행: [생년월일] 필드가 누락되었습니다.`); continue; }
                    if (!rowData['연락처']) { errors.push(`${i + 1}번 행: [연락처] 필드가 누락되었습니다.`); continue; }

                    const parsedHeight = Number(rowData['신장']) || 170;
                    const parsedWeight = Number(rowData['체중']) || 65;
                    
                    const age = new Date().getFullYear() - (Number(rowData['생년월일'].split('-')[0]) || 1995);

                    importedList.push({
                        id: `ACT-${String(Math.floor(Math.random() * 90000) + 10000)}`,
                        name: rowData['이름'],
                        gender: rowData['성별'] || '남성',
                        isMale: rowData['성별'] !== '여성',
                        dob: rowData['생년월일'],
                        age,
                        phone: rowData['연락처'],
                        email: rowData['이메일'] || '',
                        sns: rowData['SNS'] || '',
                        photoUrl: `https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150&h=150&fit=crop&crop=faces`, // default avatar
                        height: parsedHeight,
                        weight: parsedWeight,
                        bodyType: rowData['체형'] || '보통',
                        skills: rowData['특기'] ? rowData['특기'].split('/') : [],
                        filmography: rowData['출연작'] ? rowData['출연작'].split('/') : [],
                        collabHistory: [],
                        ndaSigned: false
                    });
                }

                return { success: true, list: importedList, errors };
            };

            const triggerImport = () => {
                if (!fileContent.trim()) {
                    return alert('가져올 CSV 데이터를 텍스트 상자에 입력하거나 파일 내용을 확인해 주세요.');
                }

                setLoading(true);
                setTimeout(() => {
                    const parsed = parseCsvData(fileContent);
                    setLoading(false);
                    if (parsed.success) {
                        setActors(prev => [...parsed.list, ...prev]);
                        setImportResult({
                            count: parsed.list.length,
                            errors: parsed.errors
                        });
                        addLog('일괄 등록 (CSV)', `CSV 파싱을 통하여 신규 배우 ${parsed.list.length}명을 데이터베이스에 일괄 적재했습니다.`);
                        alert(`일괄 등록 성공: ${parsed.list.length}명의 배우 프로필이 등록되었습니다.`);
                    } else {
                        alert(`에러: ${parsed.error}`);
                    }
                }, 1000); // simulated loading animation
            };

            const handleFileDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                const file = e.dataTransfer.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (evt) => {
                        setFileContent(evt.target.result);
                        addLog('파일 읽기', `업로드된 로컬 CSV 파일 [${file.name}] 로딩 성공`);
                    };
                    reader.readAsText(file);
                }
            };

            return (
                <div className="space-y-6">
                    <div>
                        <h2 className="text-2xl font-bold tracking-tight text-zinc-950 dark:text-zinc-50">CSV/Excel 배우 데이터 일괄 가져오기</h2>
                        <p className="text-zinc-500 text-sm">기존 에이전시 관리 대장(엑셀 또는 CSV)을 웹 데이터베이스로 신속히 병합합니다.</p>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        {/* Input Area */}
                        <div className="lg:col-span-7 bg-white dark:bg-[#0c0c0f] border border-zinc-200 dark:border-zinc-800 rounded-xl p-6 shadow-sm space-y-4">
                            <h3 className="text-sm font-bold text-zinc-900 dark:text-zinc-50">CSV 텍스트 입력 및 파일 드롭</h3>
                            
                            <div 
                                onDragOver={handleDragOver}
                                onDragLeave={handleDragLeave}
                                onDrop={handleFileDrop}
                                className={`border-2 border-dashed rounded-xl p-6 flex flex-col items-center justify-center text-center transition-all ${
                                    isDragging 
                                        ? 'border-blue-500 bg-blue-50/50 dark:bg-blue-950/20' 
                                        : 'border-zinc-200 dark:border-zinc-850 bg-zinc-50/50 dark:bg-zinc-900/20'
                                }`}
                            >
                                <Icons.Upload className="w-10 h-10 text-zinc-400 mb-3" />
                                <p className="text-xs font-semibold text-zinc-700 dark:text-zinc-300">CSV 파일을 여기에 끌어다 놓으세요.</p>
                                <p className="text-[10px] text-zinc-500 mt-1">또는 아래 텍스트 영역에 복사하여 붙여넣으십시오.</p>
                            </div>

                            <div className="space-y-1.5">
                                <label className="block text-xs font-semibold text-zinc-500">CSV 데이터 입력</label>
                                <textarea
                                    value={fileContent}
                                    onChange={(e) => setFileContent(e.target.value)}
                                    rows="10"
                                    placeholder="여기에 CSV 데이터를 입력하거나 파일을 업로드 하세요..."
                                    className="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-lg p-3 text-xs font-mono focus:outline-none"
                                />
                            </div>

                            <div className="flex justify-between items-center pt-2">
                                <button
                                    onClick={() => setFileContent(sampleCsv)}
                                    className="text-xs font-semibold text-blue-500 hover:text-blue-600 hover:underline"
                                >
                                    임포트 테스트용 샘플 CSV 양식 붙여넣기
                                </button>
                                <button
                                    onClick={triggerImport}
                                    disabled={loading}
                                    className="bg-blue-600 hover:bg-blue-700 text-white rounded-lg px-4 py-2 text-xs font-semibold transition-all shadow-sm flex items-center gap-2 disabled:opacity-55"
                                >
                                    {loading ? (
                                        <>
                                            <span className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin" />
                                            일괄 업로드 처리 중...
                                        </>
                                    ) : (
                                        <>
                                            <Icons.Upload className="w-4 h-4" />
                                            가져오기 실행
                                        </>
                                    )}
                                </button>
                            </div>
                        </div>

                        {/* Format guide and statistics */}
                        <div className="lg:col-span-5 space-y-6">
                            <div className="bg-white dark:bg-[#0c0c0f] border border-zinc-200 dark:border-zinc-800 rounded-xl p-6 shadow-sm space-y-4">
                                <h3 className="text-sm font-bold text-zinc-900 dark:text-zinc-50">CSV 데이터 서식 가이드</h3>
                                <div className="text-xs space-y-2.5 text-zinc-600 dark:text-zinc-400">
                                    <p>데이터 유효성 검사 규칙 및 권장 구성입니다.</p>
                                    <div className="p-3 bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-850 rounded-lg font-mono text-[10px] space-y-1">
                                        <p>• 필수: 이름, 생년월일(YYYY-MM-DD), 연락처</p>
                                        <p>• 다중 값 입력: 슬래시(/) 문자열 구분 (예: 태권도/영어회화)</p>
                                        <p>• 헤더 형식: 이름,성별,생년월일,연락처,신장,체중,체형,특기,이메일,SNS,출연작</p>
                                    </div>
                                    <p className="text-[10px] text-zinc-500">
                                        ※ 중복 검사는 고유 성명 및 생년월일을 매칭하여 자동 수행됩니다.
                                    </p>
                                </div>
                            </div>

                            {importResult && (
                                <div className="bg-white dark:bg-[#0c0c0f] border border-zinc-200 dark:border-zinc-800 rounded-xl p-6 shadow-sm space-y-4 animate-fadeIn">
                                    <h3 className="text-sm font-bold text-zinc-900 dark:text-zinc-50 flex items-center gap-1.5 text-emerald-600 dark:text-emerald-400">
                                        <Icons.CheckCircle className="w-5 h-5" />
                                        업로드 처리 리포트
                                    </h3>
                                    <div className="text-xs space-y-2">
                                        <p>• 정상 적재 완료: <span className="font-bold font-mono text-zinc-900 dark:text-zinc-50">{importResult.count}명</span></p>
                                        <p>• 경고/오류 메시지: {importResult.errors.length}건</p>
                                        
                                        {importResult.errors.length > 0 && (
                                            <div className="max-h-36 overflow-y-auto p-2 bg-rose-50 dark:bg-rose-950/20 text-rose-800 dark:text-rose-400 border border-rose-100 dark:border-rose-900/30 rounded-lg text-[10px] space-y-1 font-mono">
                                                {importResult.errors.map((err, idx) => <p key={idx}>{err}</p>)}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // SUBCOMPONENT: SecurityView (Access audit log)
        // ==========================================
        function SecurityView({ logs, addLog }) {
            const clearLogs = () => {
                if (confirm('보안 감사 로그 이력을 전체 삭제하시겠습니까? (이 동작은 되돌릴 수 없습니다.)')) {
                    addLog('감사 삭제', '과거 보안 감사 로그 이력의 아카이빙을 소거했습니다.');
                    alert('로그가 초기화되었습니다.');
                }
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <div>
                            <h2 className="text-2xl font-bold tracking-tight text-zinc-950 dark:text-zinc-50">보안 통제 및 감사 로그</h2>
                            <p className="text-zinc-500 text-sm">개인정보 조회 기록 및 NDA 기밀 서약 인증 이력 모니터링</p>
                        </div>
                        <button
                            onClick={clearLogs}
                            className="bg-zinc-100 dark:bg-zinc-900 hover:bg-zinc-200 dark:hover:bg-zinc-800 text-zinc-700 dark:text-zinc-300 border border-zinc-200 dark:border-zinc-800 rounded-lg px-4 py-2 text-xs font-semibold transition-colors shadow-xs"
                        >
                            로그 초기화
                        </button>
                    </div>

                    {/* Infrastructure security overview */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-white dark:bg-[#0c0c0f] border border-zinc-200 dark:border-zinc-800 rounded-xl p-5 shadow-sm space-y-2">
                            <h4 className="text-xs font-bold text-zinc-400 uppercase tracking-wider">데이터 암호화 채널</h4>
                            <div className="flex items-center gap-2">
                                <span className="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse" />
                                <span className="text-sm font-semibold">AES-256 개인정보 암호화</span>
                            </div>
                            <p className="text-[10px] text-zinc-500">배우의 주민등록번호대신 사용하는 생년월일, 연락처는 가상 메모리 암호화 보호 장치가 켜진 상태입니다.</p>
                        </div>
                        
                        <div className="bg-white dark:bg-[#0c0c0f] border border-zinc-200 dark:border-zinc-800 rounded-xl p-5 shadow-sm space-y-2">
                            <h4 className="text-xs font-bold text-zinc-400 uppercase tracking-wider">접속 권한(RBAC)</h4>
                            <div className="flex items-center gap-2">
                                <span className="p-1 bg-blue-500/10 text-blue-500 rounded text-xs font-bold font-mono">ROLE_MASTER</span>
                                <span className="text-xs text-zinc-500">최고 권한 관리자</span>
                            </div>
                            <p className="text-[10px] text-zinc-500">현재 클라이언트 계정은 배우 정보의 CRUD 및 마스킹 해제 로그를 볼 수 있는 Master Role 권한자입니다.</p>
                        </div>

                        <div className="bg-white dark:bg-[#0c0c0f] border border-zinc-200 dark:border-zinc-800 rounded-xl p-5 shadow-sm space-y-2">
                            <h4 className="text-xs font-bold text-zinc-400 uppercase tracking-wider">전자서명 보안 등급</h4>
                            <div className="flex items-center gap-2">
                                <span className="text-sm font-semibold text-emerald-600 dark:text-emerald-400">SHA-256 인증 토큰 발급</span>
                            </div>
                            <p className="text-[10px] text-zinc-500">서명된 NDA 계약은 브라우저 세션 및 모바일 기기 고유 해시값을 조합해 위조가 원천 봉쇄된 키값 형태로 서명 완료 처리됩니다.</p>
                        </div>
                    </div>

                    {/* Logs listing */}
                    <div className="bg-white dark:bg-[#0c0c0f] border border-zinc-200 dark:border-zinc-800 rounded-xl overflow-hidden shadow-sm">
                        <div className="px-6 py-4 border-b border-zinc-200 dark:border-zinc-800 bg-zinc-50/50 dark:bg-zinc-900/30">
                            <h3 className="text-sm font-bold text-zinc-900 dark:text-zinc-50">실시간 보안 감사 로그 기록 (감사 추적)</h3>
                        </div>
                        
                        <div className="overflow-y-auto max-h-[500px]">
                            <table className="w-full text-left text-xs whitespace-nowrap">
                                <thead className="bg-zinc-50 dark:bg-zinc-900/60 text-zinc-500 dark:text-zinc-400 font-semibold border-b border-zinc-200 dark:border-zinc-800 sticky top-0">
                                    <tr>
                                        <th className="px-6 py-3">접근 일각</th>
                                        <th className="px-6 py-3">수행 사용자</th>
                                        <th className="px-6 py-3">분류</th>
                                        <th className="px-6 py-3">수행 행위 및 타겟</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-zinc-100 dark:divide-zinc-800/80 font-mono">
                                    {logs.map(log => (
                                        <tr key={log.id} className="hover:bg-zinc-50/50 dark:hover:bg-zinc-900/20">
                                            <td className="px-6 py-3 text-zinc-500">{log.time}</td>
                                            <td className="px-6 py-3 font-semibold text-zinc-900 dark:text-zinc-300">{log.user}</td>
                                            <td className="px-6 py-3">
                                                <span className={`text-[9px] font-bold px-2 py-0.5 rounded ${
                                                    log.type === '개인정보 접근' 
                                                        ? 'bg-rose-100 text-rose-700 dark:bg-rose-950/40 dark:text-rose-400' 
                                                        : log.type === 'NDA 체결' || log.type === '배우 등록'
                                                        ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-950/40 dark:text-emerald-400'
                                                        : 'bg-blue-100 text-blue-700 dark:bg-blue-950/40 dark:text-blue-400'
                                                }`}>
                                                    {log.type}
                                                </span>
                                            </td>
                                            <td className="px-6 py-3 text-zinc-700 dark:text-zinc-400 whitespace-normal">{log.desc}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        // Mount the application
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
