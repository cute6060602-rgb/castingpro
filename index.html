                        <div className="p-4 border-b border-zinc-200 dark:border-zinc-800 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 bg-zinc-50/50 dark:bg-zinc-900/30">
                            <span className="text-xs font-semibold text-zinc-500">
                                검색된 인원: <span className="font-mono text-zinc-900 dark:text-zinc-100 font-bold">{filteredActors.length}</span>명
                            </span>
                            <div className="flex items-center gap-2">
                                <label className="text-xs text-zinc-500">정렬 기준:</label>
                                <select
                                    value={sortBy}
                                    onChange={(e) => setSortBy(e.target.value)}
                                    className="bg-white dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded px-2 py-1 text-xs focus:outline-none"
                                >
                                    <option value="name">이름</option>
                                    <option value="height">신장</option>
                                    <option value="age">나이</option>
                                    <option value="collab">협업 횟수</option>
                                </select>
                                <select
                                    value={sortOrder}
                                    onChange={(e) => setSortOrder(e.target.value)}
                                    className="bg-white dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded px-2 py-1 text-xs focus:outline-none"
                                >
                                    <option value="asc">오름차순 ⬆</option>
                                    <option value="desc">내림차순 ⬇</option>
                                </select>
                            </div>
                        </div>

                        {filteredActors.length === 0 ? (
                            <div className="flex flex-col items-center justify-center py-16 px-4">
                                <Icons.AlertCircle className="w-12 h-12 text-zinc-400 mb-3" />
                                <h3 className="text-base font-bold text-zinc-700 dark:text-zinc-300">검색 조건에 부합하는 배우가 없습니다.</h3>
                                <p className="text-zinc-500 text-xs mt-1">검색어를 수정하거나 필터를 완화해 보세요.</p>
                            </div>
                        ) : viewMode === 'table' ? (
                            /* TABLE VIEW */
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm whitespace-nowrap">
                                    <thead className="bg-zinc-50 dark:bg-zinc-900/60 text-zinc-500 dark:text-zinc-400 font-semibold border-b border-zinc-200 dark:border-zinc-800 text-xs">
                                        <tr>
                                            <th className="px-4 py-3.5 w-10 text-center">
                                                <input
                                                    type="checkbox"
                                                    checked={paginatedActors.length > 0 && paginatedActors.every(a => selectedActorIds.includes(a.id))}
                                                    onChange={(e) => {
                                                        if (e.target.checked) {
                                                            const pageIds = paginatedActors.map(a => a.id);
                                                            setSelectedActorIds(prev => [...new Set([...prev, ...pageIds])]);
                                                        } else {
                                                            const pageIds = paginatedActors.map(a => a.id);
                                                            setSelectedActorIds(prev => prev.filter(id => !pageIds.includes(id)));
                                                        }
                                                    }}
                                                    className="rounded text-blue-600 focus:ring-blue-500 bg-zinc-100 dark:bg-zinc-800 border-zinc-300 dark:border-zinc-700 w-4 h-4 cursor-pointer"
                                                />
                                            </th>
                                            <th className="px-6 py-3.5">코드/이름</th>
                                            <th className="px-6 py-3.5">인적 속성</th>
                                            <th className="px-6 py-3.5">신체 스펙</th>
                                            <th className="px-6 py-3.5">주요 특기</th>
                                            <th className="px-6 py-3.5">민감 데이터 (보안)</th>
                                            <th className="px-6 py-3.5 text-center">NDA 서약 ({inspectProject})</th>
                                            <th className="px-6 py-3.5 text-right">관리</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-zinc-100 dark:divide-zinc-800/80">
                                        {paginatedActors.map(actor => {
                                            const decryptedPhone = decryptedFields[`${actor.id}-phone`];
                                            const decryptedEmail = decryptedFields[`${actor.id}-email`];
                                            
                                            // Check project specific NDA
                                            const actorProjectNda = ndas.find(n => n.actorId === actor.id && n.projectName === inspectProject);

                                            return (
                                                <tr
                                                    key={actor.id}
                                                    onClick={() => onActorClick(actor.id)}
                                                    className={`hover:bg-zinc-50 dark:hover:bg-zinc-900/40 cursor-pointer transition-colors ${
                                                        selectedActorIds.includes(actor.id) ? 'bg-blue-50/50 dark:bg-blue-900/10' : ''
                                                    }`}
                                                >
                                                    <td className="px-4 py-4 w-10 text-center" onClick={(e) => e.stopPropagation()}>
                                                        <input
                                                            type="checkbox"
                                                            checked={selectedActorIds.includes(actor.id)}
                                                            onChange={() => {
                                                                setSelectedActorIds(prev => 
                                                                    prev.includes(actor.id) ? prev.filter(id => id !== actor.id) : [...prev, actor.id]
                                                                );
                                                            }}
                                                            className="rounded text-blue-600 focus:ring-blue-500 bg-zinc-50 dark:bg-zinc-950 border-zinc-300 dark:border-zinc-700 w-4 h-4 cursor-pointer"
                                                        />
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <div className="flex items-center gap-3">
                                                            <img
                                                                src={actor.photoUrl}
                                                                alt={actor.name}
                                                                className="w-10 h-10 rounded-full border border-zinc-200 dark:border-zinc-800 object-cover bg-zinc-100"
                                                                onError={(e) => {
                                                                    e.target.src = `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='%232563eb'><rect width='100' height='100'/><text x='50' y='55' fill='white' font-size='30' font-family='sans-serif' text-anchor='middle'>${actor.name[0]}</text></svg>`;
                                                                }}
                                                            />
                                                            <div>
                                                                <p className="font-bold text-zinc-950 dark:text-zinc-50">{actor.name}</p>
                                                                <p className="text-[10px] text-zinc-500 font-mono">{actor.id}</p>
                                                            </div>
                                                        </div>
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <div className="text-xs space-y-0.5">
                                                            <p><span className="text-zinc-500">성별:</span> {actor.gender}</p>
                                                            <p><span className="text-zinc-500">나이:</span> {actor.age}세 ({actor.dob.split('-')[0]}년생)</p>
                                                        </div>
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <div className="text-xs space-y-0.5">
                                                            <p><span className="text-zinc-500">키:</span> {actor.height}cm</p>
                                                            <p><span className="text-zinc-500">체중/체형:</span> {actor.weight}kg / {actor.bodyType}</p>
                                                        </div>
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <div className="flex flex-wrap gap-1 max-w-xs">
                                                            {actor.skills.slice(0, 2).map(skill => (
                                                                <span key={skill} className="bg-zinc-100 dark:bg-zinc-800/80 text-zinc-700 dark:text-zinc-300 text-[10px] px-2 py-0.5 rounded-full font-medium">
                                                                    {skill}
                                                                </span>
                                                            ))}
                                                            {actor.skills.length > 2 && (
                                                                <span className="text-[10px] text-zinc-400 self-center">
                                                                    외 {actor.skills.length - 2}개
                                                                </span>
                                                            )}
                                                        </div>
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <div className="text-xs space-y-1.5" onClick={(e) => e.stopPropagation()}>
                                                            <div className="flex items-center gap-2 font-mono">
                                                                <span className="text-zinc-500 w-12 text-[10px]">연락처:</span>
                                                                <span>
                                                                    {decryptedPhone ? actor.phone : '010-••••-••••'}
                                                                </span>
                                                                <button
                                                                    onClick={() => revealSensitiveData(actor.id, 'phone')}
                                                                    className="p-1 bg-zinc-100 dark:bg-zinc-800 rounded hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-colors"
                                                                    title="조회 로그 기록"
                                                                >
                                                                    {decryptedPhone ? (
                                                                        <Icons.EyeOff className="w-3.5 h-3.5 text-zinc-500" />
                                                                    ) : (
                                                                        <Icons.Eye className="w-3.5 h-3.5 text-blue-500" />
                                                                    )}
                                                                </button>
                                                            </div>
                                                            <div className="flex items-center gap-2 font-mono">
                                                                <span className="text-zinc-500 w-12 text-[10px]">이메일:</span>
                                                                <span>
                                                                    {decryptedEmail ? actor.email : '••••••••@mail.com'}
                                                                </span>
                                                                <button
                                                                    onClick={() => revealSensitiveData(actor.id, 'email')}
                                                                    className="p-1 bg-zinc-100 dark:bg-zinc-800 rounded hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-colors"
                                                                    title="조회 로그 기록"
                                                                >
                                                                    {decryptedEmail ? (
                                                                        <Icons.EyeOff className="w-3.5 h-3.5 text-zinc-500" />
                                                                    ) : (
                                                                        <Icons.Eye className="w-3.5 h-3.5 text-blue-500" />
                                                                    )}
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </td>
                                                    <td className="px-6 py-4 text-center">
                                                        {actorProjectNda ? (
                                                            actorProjectNda.status === 'signed' ? (
                                                                <span className="inline-flex items-center gap-1 text-xs font-semibold px-2.5 py-0.5 bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 rounded-full border border-emerald-500/20">
                                                                    서명 완료
                                                                </span>
                                                            ) : (
                                                                <span className="inline-flex items-center gap-1 text-xs font-semibold px-2.5 py-0.5 bg-amber-500/10 text-amber-600 dark:text-amber-400 rounded-full border border-amber-500/20">
                                                                    서명 대기
                                                                </span>
                                                            )
                                                        ) : (
                                                            <span className="inline-flex items-center gap-1 text-xs font-semibold px-2.5 py-0.5 bg-zinc-500/10 text-zinc-500 rounded-full border border-zinc-200 dark:border-zinc-800">
                                                                미집행
                                                            </span>
                                                        )}
                                                    </td>
                                                    <td className="px-6 py-4 text-right" onClick={(e) => e.stopPropagation()}>
                                                        <div className="flex justify-end gap-1">
                                                            <button
                                                                onClick={() => {
                                                                    setActorToEdit(actor);
                                                                    setIsEditModalOpen(true);
                                                                }}
                                                                className="p-1.5 hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-600 dark:text-zinc-400 rounded-lg transition-colors"
                                                                title="수정"
                                                            >
                                                                <Icons.Edit className="w-4 h-4" />
                                                            </button>
                                                            <button
                                                                onClick={(e) => handleDeleteActor(actor.id, actor.name, e)}
                                                                className="p-1.5 hover:bg-rose-50 dark:hover:bg-rose-950/40 text-rose-600 rounded-lg transition-colors"
                                                                title="삭제"
                                                            >
                                                                <Icons.Trash className="w-4 h-4" />
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        ) : (
                            /* GRID CARD VIEW */
                            <div className="p-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-5 gap-6">
                                {paginatedActors.map(actor => {
                                    const actorProjectNda = ndas.find(n => n.actorId === actor.id && n.projectName === inspectProject);
                                    return (
                                        <div
                                            key={actor.id}
                                            onClick={() => onActorClick(actor.id)}
                                            className={`relative bg-zinc-50 dark:bg-zinc-900 border hover:border-zinc-300 dark:hover:border-zinc-700 rounded-xl p-4 cursor-pointer transition-all flex flex-col justify-between hover:shadow-md animate-fadeIn ${
                                                selectedActorIds.includes(actor.id) ? 'border-blue-500 dark:border-blue-500/60 ring-1 ring-blue-500/30' : 'border-zinc-200 dark:border-zinc-800/80'
                                            }`}
                                        >
                                            {/* Checkbox overlay absolute positioned */}
                                            <div className="absolute top-3 left-3 z-10" onClick={(e) => e.stopPropagation()}>
                                                <input
                                                    type="checkbox"
                                                    checked={selectedActorIds.includes(actor.id)}
                                                    onChange={() => {
                                                        setSelectedActorIds(prev => 
                                                            prev.includes(actor.id) ? prev.filter(id => id !== actor.id) : [...prev, actor.id]
                                                        );
                                                    }}
                                                    className="rounded text-blue-600 focus:ring-blue-500 bg-zinc-50 dark:bg-zinc-950 border-zinc-300 dark:border-zinc-700 w-4 h-4 cursor-pointer shadow-xs"
                                                />
                                            </div>

                                            <div>
                                                {/* Photo & Basic Name info */}
                                                <div className="flex gap-3 pl-5">
                                                    <img
                                                        src={actor.photoUrl}
                                                        alt={actor.name}
                                                        className="w-12 h-12 rounded-full border border-zinc-200 dark:border-zinc-800 object-cover bg-zinc-100 flex-shrink-0"
                                                        onError={(e) => {
                                                            e.target.src = `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='%232563eb'><rect width='100' height='100'/><text x='50' y='55' fill='white' font-size='30' font-family='sans-serif' text-anchor='middle'>${actor.name[0]}</text></svg>`;
                                                        }}
                                                    />
                                                    <div>
                                                        <div className="flex items-center gap-1.5">
                                                            <span className="font-bold text-sm text-zinc-950 dark:text-zinc-50">{actor.name}</span>
                                                            <span className={`text-[10px] px-1.5 py-0.2 rounded font-semibold ${
                                                                actor.gender === '남성' ? 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400' : 'bg-pink-100 text-pink-700 dark:bg-pink-900/30 dark:text-pink-400'
                                                            }`}>
                                                                {actor.gender}
                                                            </span>
                                                        </div>
                                                        <p className="text-[10px] text-zinc-500 font-mono mt-0.5">{actor.id}</p>
                                                    </div>
                                                </div>

                                                {/* Bio specs */}
                                                <div className="mt-3 text-xs grid grid-cols-2 gap-y-1 gap-x-2 bg-white dark:bg-zinc-950/60 p-2 rounded-lg border border-zinc-100 dark:border-zinc-800 pl-5">
                                                    <p><span className="text-zinc-400">신장:</span> {actor.height}cm</p>
                                                    <p><span className="text-zinc-400">체중:</span> {actor.weight}kg</p>
                                                    <p className="col-span-2"><span className="text-zinc-400">체형:</span> {actor.bodyType}</p>
                                                    <p className="col-span-2"><span className="text-zinc-400">나이:</span> {actor.age}세 ({actor.dob.split('-')[0]}년생)</p>
                                                </div>

                                                {/* Skills */}
                                                <div className="mt-3 pl-5">
                                                    <p className="text-[10px] font-semibold text-zinc-400 uppercase tracking-wider mb-1">보유 특기</p>
                                                    <div className="flex flex-wrap gap-1">
                                                        {actor.skills.slice(0, 3).map(skill => (
                                                            <span key={skill} className="bg-zinc-100 dark:bg-zinc-800/80 text-zinc-700 dark:text-zinc-300 text-[10px] px-2 py-0.5 rounded-full font-medium">
                                                                {skill}
                                                            </span>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Bottom Sign indicator and action buttons */}
                                            <div className="mt-4 pt-3 border-t border-zinc-200 dark:border-zinc-800 flex justify-between items-center" onClick={e => e.stopPropagation()}>
                                                {actorProjectNda ? (
                                                    actorProjectNda.status === 'signed' ? (
                                                        <span className="text-[10px] font-semibold text-emerald-600 dark:text-emerald-400 flex items-center gap-1">
                                                            ● NDA 체결
                                                        </span>
                                                    ) : (
                                                        <span className="text-[10px] font-semibold text-amber-500 flex items-center gap-1">
                                                            ▲ 서명 대기
                                                        </span>
                                                    )
                                                ) : (
                                                    <span className="text-[10px] font-semibold text-zinc-400 flex items-center gap-1">
                                                        ○ NDA 미집행
                                                    </span>
                                                )}
                                                <div className="flex gap-1">
                                                    <button
                                                        onClick={() => {
                                                            setActorToEdit(actor);
                                                            setIsEditModalOpen(true);
                                                        }}
                                                        className="p-1 hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500 rounded transition-colors"
                                                    >
                                                        <Icons.Edit className="w-3.5 h-3.5" />
                                                    </button>
                                                    <button
                                                        onClick={(e) => handleDeleteActor(actor.id, actor.name, e)}
                                                        className="p-1 hover:bg-rose-100 dark:hover:bg-rose-950/40 text-rose-600 rounded transition-colors"
                                                    >
                                                        <Icons.Trash className="w-3.5 h-3.5" />
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {/* Pagination Row */}
                        <div className="p-4 border-t border-zinc-200 dark:border-zinc-800 flex items-center justify-between bg-zinc-50/50 dark:bg-zinc-900/30">
                            <span className="text-xs text-zinc-500">
                                전체 {filteredActors.length}명 중 {Math.min(filteredActors.length, (currentPage - 1) * itemsPerPage + 1)} - {Math.min(filteredActors.length, currentPage * itemsPerPage)}명 표시
                            </span>
                            <div className="flex items-center gap-1.5">
                                <button
                                    onClick={() => setCurrentPage(prev => Math.max(1, prev - 1))}
                                    disabled={currentPage === 1}
                                    className="p-1.5 rounded-lg border border-zinc-200 dark:border-zinc-800 hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500 dark:text-zinc-400 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                                >
                                    <Icons.ChevronLeft className="w-4 h-4" />
                                </button>
                                <span className="text-xs font-semibold px-3 py-1 bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-800 rounded-lg">
                                    {currentPage} / {totalPages}
                                </span>
                                <button
                                    onClick={() => setCurrentPage(prev => Math.min(totalPages, prev + 1))}
                                    disabled={currentPage === totalPages}
                                    className="p-1.5 rounded-lg border border-zinc-200 dark:border-zinc-800 hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500 dark:text-zinc-400 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                                >
                                    <Icons.ChevronRight className="w-4 h-4" />
                                </button>
                            </div>
                        </div>

                    </div>

                    {/* FLOATING BATCH ACTION BAR FOR MULTI-SELECT NDA SEND */}
                    {selectedActorIds.length > 0 && (
                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white dark:bg-[#0c0c0f] border border-zinc-200 dark:border-zinc-800 rounded-xl px-5 py-3.5 shadow-2xl flex items-center gap-4 z-40 animate-slideUp">
                            <div className="text-xs font-bold text-zinc-700 dark:text-zinc-300">
                                배우 <span className="text-blue-500 font-mono font-extrabold text-sm">{selectedActorIds.length}</span>명 선택됨
                            </div>
                            <div className="h-4 w-px bg-zinc-200 dark:bg-zinc-800" />
                            <div className="flex items-center gap-2">
                                <label className="text-[10px] font-bold text-zinc-400 whitespace-nowrap">집행할 작품:</label>
                                <select
                                    value={batchNdaProject}
                                    onChange={(e) => setBatchNdaProject(e.target.value)}
                                    className="bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-lg px-2.5 py-1 text-xs font-semibold focus:outline-none focus:ring-1 focus:ring-blue-500 cursor-pointer"
                                >
                                    {projects.map(p => <option key={p} value={p}>{p}</option>)}
                                </select>
                            </div>
                            <button
                                onClick={handleBatchNdaSendFromDatabase}
                                className="bg-blue-600 hover:bg-blue-700 text-white rounded-lg px-3.5 py-1.5 text-xs font-semibold flex items-center gap-1.5 transition-colors shadow-sm"
                            >
                                <Icons.FileText className="w-3.5 h-3.5" />
                                선택 배우 NDA 일괄 발송
                            </button>
                            <button
                                onClick={() => setSelectedActorIds([])}
                                className="text-xs font-semibold text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-200 px-2 py-1"
                            >
                                선택 해제
                            </button>
                        </div>
                    )}
                </div>
            );
        }
        // ==========================================
        // SUBCOMPONENT: ActorFormModal
        // ==========================================
        function ActorFormModal({ actor, onClose, onSave, projects }) {
            const isEdit = !!actor;
            const [name, setName] = useState(isEdit ? actor.name : '');
            const [gender, setGender] = useState(isEdit ? actor.gender : '남성');
            const [dob, setDob] = useState(isEdit ? actor.dob : '1995-01-01');
            const [phone, setPhone] = useState(isEdit ? actor.phone : '010-');
            const [email, setEmail] = useState(isEdit ? actor.email : '');
            const [sns, setSns] = useState(isEdit ? actor.sns : '@');
            const [height, setHeight] = useState(isEdit ? actor.height : 175);
            const [weight, setWeight] = useState(isEdit ? actor.weight : 70);
            const [bodyType, setBodyType] = useState(isEdit ? actor.bodyType : '보통');
            
            const [skillsText, setSkillsText] = useState(isEdit ? actor.skills.join(', ') : '');
            const [filmographyText, setFilmographyText] = useState(isEdit ? actor.filmography.join(', ') : '');

            const handleSubmit = (e) => {
                e.preventDefault();

                if (!name.trim()) return alert('이름을 입력해주세요.');
                if (!dob) return alert('생년월일을 입력해주세요.');
                if (!phone.trim() || phone === '010-') return alert('연락처를 입력해주세요.');

                const skills = skillsText.split(',')
                    .map(s => s.trim())
                    .filter(s => s.length > 0);
                
                const filmography = filmographyText.split(',')
                    .map(f => f.trim())
                    .filter(f => f.length > 0);

                // calculate age
                const currentYear = new Date().getFullYear();
                const birthYear = Number(dob.split('-')[0]) || 1995;
                const age = currentYear - birthYear;

                const savedData = {
                    id: isEdit ? actor.id : `ACT-${String(Math.floor(Math.random() * 90000) + 10000)}`,
                    name,
                    gender,
                    isMale: gender === '남성',
                    dob,
                    age,
                    phone,
                    email,
                    sns,
                    photoUrl: isEdit ? actor.photoUrl : `https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150&h=150&fit=crop&crop=faces`, // default avatar
                    height: Number(height),
                    weight: Number(weight),
                    bodyType,
                    skills,
                    filmography,
                    collabHistory: isEdit ? actor.collabHistory : [],
                    ndaSigned: isEdit ? actor.ndaSigned : false
                };

                onSave(savedData);
            };

            return (
                <div className="fixed inset-0 bg-zinc-950/60 backdrop-blur-xs flex items-center justify-center p-4 z-50 animate-fadeIn">
                    <div className="bg-white dark:bg-[#0c0c0f] border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
                        {/* Header */}
                        <div className="px-6 py-4 border-b border-zinc-200 dark:border-zinc-800 flex justify-between items-center bg-zinc-50 dark:bg-zinc-900/30">
                            <h3 className="text-lg font-bold text-zinc-900 dark:text-zinc-50">
                                {isEdit ? `배우 정보 수정 [${actor.id}]` : '배우 신규 등록'}
                            </h3>
                            <button
                                onClick={onClose}
                                className="p-1.5 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded-lg text-zinc-500 transition-colors"
                            >
                                <Icons.Close className="w-5 h-5" />
                            </button>
                        </div>

                        {/* Form */}
                        <form onSubmit={handleSubmit} className="flex-1 overflow-y-auto p-6 space-y-4">
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-semibold text-zinc-500 mb-1.5">이름 *</label>
                                    <input
                                        type="text"
                                        value={name}
                                        onChange={(e) => setName(e.target.value)}
                                        className="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50"
                                        placeholder="홍길동"
                                        required
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-zinc-500 mb-1.5">성별 *</label>
                                    <div className="flex bg-zinc-100 dark:bg-zinc-900 p-0.5 rounded-lg border border-zinc-200 dark:border-zinc-800">
                                        <button
                                            type="button"
                                            onClick={() => setGender('남성')}
                                            className={`flex-1 py-1.5 text-xs font-semibold rounded-md transition-colors ${
                                                gender === '남성'
                                                    ? 'bg-white dark:bg-zinc-800 text-zinc-900 dark:text-zinc-100 shadow-xs'
                                                    : 'text-zinc-500'
                                            }`}
                                        >
                                            남성
                                        </button>
                                        <button
                                            type="button"
                                            onClick={() => setGender('여성')}
                                            className={`flex-1 py-1.5 text-xs font-semibold rounded-md transition-colors ${
                                                gender === '여성'
                                                    ? 'bg-white dark:bg-zinc-800 text-zinc-900 dark:text-zinc-100 shadow-xs'
                                                    : 'text-zinc-500'
                                            }`}
                                        >
                                            여성
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-semibold text-zinc-500 mb-1.5">생년월일 *</label>
                                    <input
                                        type="date"
                                        value={dob}
                                        onChange={(e) => setDob(e.target.value)}
                                        className="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50"
                                        required
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-zinc-500 mb-1.5">연락처 *</label>
                                    <input
                                        type="text"
                                        value={phone}
                                        onChange={(e) => setPhone(e.target.value)}
                                        className="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 font-mono"
                                        placeholder="010-1234-5678"
                                        required
                                    />
                                </div>
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-semibold text-zinc-500 mb-1.5">이메일 주소</label>
                                    <input
                                        type="email"
                                        value={email}
                                        onChange={(e) => setEmail(e.target.value)}
                                        className="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 font-mono"
                                        placeholder="actor@mail.com"
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-zinc-500 mb-1.5">SNS 계정</label>
                                    <input
                                        type="text"
                                        value={sns}
                                        onChange={(e) => setSns(e.target.value)}
                                        className="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 font-mono"
                                        placeholder="@instagram_handle"
                                    />
                                </div>
                            </div>

                            <div className="grid grid-cols-3 gap-4">
                                <div>
                                    <label className="block text-xs font-semibold text-zinc-500 mb-1.5">신장 (cm)</label>
                                    <input
                                        type="number"
                                        value={height}
                                        onChange={(e) => setHeight(Number(e.target.value))}
                                        className="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50"
                                        required
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-zinc-500 mb-1.5">체중 (kg)</label>
                                    <input
                                        type="number"
                                        value={weight}
                                        onChange={(e) => setWeight(Number(e.target.value))}
                                        className="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50"
                                        required
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-zinc-500 mb-1.5">체형</label>
                                    <select
                                        value={bodyType}
                                        onChange={(e) => setBodyType(e.target.value)}
                                        className="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50"
                                    >
                                        {BODY_TYPES.map(b => <option key={b} value={b}>{b}</option>)}
                                    </select>
                                </div>
                            </div>

                            <div>
                                <label className="block text-xs font-semibold text-zinc-500 mb-1.5">특기 (쉼표로 구분)</label>
                                <input
                                    type="text"
                                    value={skillsText}
                                    onChange={(e) => setSkillsText(e.target.value)}
                                    className="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50"
                                    placeholder="영어 회화, 경상도 사투리, 태권도"
                                />
                                <p className="text-[10px] text-zinc-500 mt-1">예: 경상도 사투리, 검술, 태권도 3단</p>
                            </div>

                            <div>
                                <label className="block text-xs font-semibold text-zinc-500 mb-1.5">출연작 필모그래피 (쉼표로 구분)</label>
                                <input
                                    type="text"
                                    value={filmographyText}
                                    onChange={(e) => setFilmographyText(e.target.value)}
                                    className="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50"
                                    placeholder="오징어 게임, 기생충"
                                />
                            </div>
                        </form>

                        {/* Footer */}
                        <div className="px-6 py-4 border-t border-zinc-200 dark:border-zinc-800 bg-zinc-50 dark:bg-zinc-900/30 flex justify-end gap-2">
                            <button
                                type="button"
                                onClick={onClose}
                                className="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-lg px-4 py-2 text-xs font-semibold hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-700 dark:text-zinc-300 transition-colors shadow-xs"
                            >
                                취소
                            </button>
                            <button
                                onClick={handleSubmit}
                                className="bg-blue-600 hover:bg-blue-700 text-white rounded-lg px-4 py-2 text-xs font-semibold transition-colors shadow-xs"
                            >
                                {isEdit ? '수정 완료' : '등록'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // SUBCOMPONENT: ActorDetailPanel
        // ==========================================
        function ActorDetailPanel({ 
            isOpen, 
            onClose, 
            actorId, 
            actors, 
            setActors,
            ndas, 
            setNdas, 
            revealSensitiveData, 
            decryptedFields, 
            projects, 
            setProjects,
            addLog 
        }) {
            const actor = useMemo(() => actors.find(a => a.id === actorId), [actors, actorId]);
            const [selectedProject, setSelectedProject] = useState(projects[0]);
            
            // Check if there is already an NDA for this actor and project
            const projectNda = useMemo(() => {
                if (!actor) return null;
                return ndas.find(n => n.actorId === actor.id && n.projectName === selectedProject);
            }, [ndas, actor, selectedProject]);

            if (!actor || !isOpen) return null;

            const decryptedPhone = decryptedFields[`${actor.id}-phone`];
            const decryptedEmail = decryptedFields[`${actor.id}-email`];

            // Send NDA mock handler
            const handleSendNda = () => {
                // Check if already sent
                if (projectNda) {
                    return alert('이미 해당 프로젝트에 대한 NDA 계약서가 전송되었거나 서명되었습니다.');
                }

                const newNdaId = `NDA-${String(Math.floor(Math.random() * 90000) + 10000)}`;
                const newNda = {
                    id: newNdaId,
                    actorId: actor.id,
                    actorName: actor.name,
                    projectName: selectedProject,
                    status: 'sent',
                    sentDate: new Date().toISOString().split('T')[0],
                    signedDate: '',
                    hash: ''
                };

                setNdas(prev => [newNda, ...prev]);
                addLog('NDA 발송', `배우 [${actor.name}]에게 [${selectedProject}] 프로젝트 기밀유지서약서(NDA)를 발송했습니다.`);
                alert(`[${actor.name}] 배우에게 이메일/SMS로 NDA 링크가 발송되었습니다.`);
            };

            // Simulate actor signs NDA
            const handleSignNda = (ndaId) => {
                const signatureHash = 'sha256-' + Math.random().toString(16).substring(2, 10).toUpperCase() + '...';
                
                // Update NDAs
                setNdas(prev => prev.map(n => n.id === ndaId ? {
                    ...n, 
                    status: 'signed',
                    signedDate: new Date().toISOString().split('T')[0],
                    hash: signatureHash
                } : n));

                // Update actor object
                setActors(prev => prev.map(a => a.id === actor.id ? { ...a, ndaSigned: true } : a));

                addLog('NDA 체결', `배우 [${actor.name}]이 [${selectedProject}] 프로젝트 NDA에 디지털 서명하였습니다. (${signatureHash})`);
                alert('디지털 서명이 완료되어 서약서가 기밀 문서 보관소에 안전하게 기록되었습니다.');
            };

            return (
                <div className="absolute inset-y-0 right-0 w-full sm:w-115 bg-white dark:bg-[#0c0c0f] border-l border-zinc-200 dark:border-zinc-800 shadow-2xl flex flex-col z-30 animate-slideLeft">
                    {/* Header */}
                    <div className="p-5 border-b border-zinc-200 dark:border-zinc-800 flex justify-between items-center bg-zinc-50 dark:bg-zinc-900/30">
                        <div>
                            <span className="text-[10px] font-mono text-zinc-500">{actor.id}</span>
                            <h3 className="text-base font-bold text-zinc-950 dark:text-zinc-50">{actor.name} 프로필 상세</h3>
                        </div>
                        <button
                            onClick={onClose}
                            className="p-1.5 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded-lg text-zinc-500 transition-colors"
                        >
                            <Icons.Close className="w-5 h-5" />
                        </button>
                    </div>

                    {/* Scrollable Body */}
                    <div className="flex-1 overflow-y-auto p-5 space-y-6">
                        
                        {/* Profile Photo and Quick Stats */}
                        <div className="flex items-center gap-4 bg-zinc-50 dark:bg-zinc-900/40 p-4 rounded-xl border border-zinc-200/60 dark:border-zinc-850">
                            <img
                                src={actor.photoUrl}
                                alt={actor.name}
                                className="w-20 h-20 rounded-xl border border-zinc-200 dark:border-zinc-850 object-cover bg-zinc-100"
                                onError={(e) => {
                                    e.target.src = `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='%232563eb'><rect width='100' height='100'/><text x='50' y='55' fill='white' font-size='30' font-family='sans-serif' text-anchor='middle'>${actor.name[0]}</text></svg>`;
                                }}
                            />
                            <div className="space-y-1">
                                <div className="flex items-center gap-2">
                                    <h4 className="text-base font-bold text-zinc-900 dark:text-zinc-50">{actor.name}</h4>
                                    <span className="text-[10px] px-2 py-0.5 rounded-full font-bold bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400">
                                        {actor.gender}
                                    </span>
                                </div>
                                <p className="text-xs text-zinc-500">생년월일: {actor.dob} ({actor.age}세)</p>
                                <div className="flex flex-wrap gap-1 mt-1.5">
                                    {actor.ndaSigned ? (
                                        <span className="text-[9px] bg-emerald-100 text-emerald-800 dark:bg-emerald-950/40 dark:text-emerald-400 font-semibold px-2 py-0.5 rounded-full border border-emerald-500/10">
                                            NDA 보안 통과
                                        </span>
                                    ) : (
                                        <span className="text-[9px] bg-zinc-100 text-zinc-500 dark:bg-zinc-800 dark:text-zinc-400 font-semibold px-2 py-0.5 rounded-full border border-zinc-200 dark:border-zinc-700">
                                            NDA 보완 필요
                                        </span>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Physical Specs */}
                        <div>
                            <h4 className="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2.5">신체 스펙 정보</h4>
                            <div className="grid grid-cols-3 gap-2 text-center text-xs">
                                <div className="bg-zinc-50 dark:bg-zinc-900/50 p-2.5 rounded-lg border border-zinc-200/50 dark:border-zinc-800">
                                    <p className="text-zinc-400 text-[10px] mb-0.5">신장</p>
                                    <p className="font-bold text-zinc-900 dark:text-zinc-50 font-mono text-sm">{actor.height} cm</p>
                                </div>
                                <div className="bg-zinc-50 dark:bg-zinc-900/50 p-2.5 rounded-lg border border-zinc-200/50 dark:border-zinc-800">
                                    <p className="text-zinc-400 text-[10px] mb-0.5">체중</p>
                                    <p className="font-bold text-zinc-900 dark:text-zinc-50 font-mono text-sm">{actor.weight} kg</p>
                                </div>
                                <div className="bg-zinc-50 dark:bg-zinc-900/50 p-2.5 rounded-lg border border-zinc-200/50 dark:border-zinc-800">
                                    <p className="text-zinc-400 text-[10px] mb-0.5">체형</p>
                                    <p className="font-bold text-zinc-900 dark:text-zinc-50 text-xs py-0.5">{actor.bodyType}</p>
                                </div>
                            </div>
                        </div>

                        {/* Sensitive contact info (masking UI) */}
                        <div className="bg-zinc-50 dark:bg-zinc-900/40 p-4 rounded-xl border border-zinc-200/60 dark:border-zinc-850 space-y-3">
                            <h4 className="text-xs font-bold text-zinc-800 dark:text-zinc-200 mb-1 flex items-center gap-1.5">
                                <Icons.Lock className="w-3.5 h-3.5 text-blue-500" />
                                보안 마스킹 인적 사항
                            </h4>
                            <div className="text-xs space-y-2.5 font-mono">
                                <div className="flex justify-between items-center">
                                    <span className="text-zinc-500 text-[10px]">연락처 (Mobile):</span>
                                    <div className="flex items-center gap-2">
                                        <span className="text-sm font-semibold">{decryptedPhone ? actor.phone : '010-••••-••••'}</span>
                                        <button
                                            onClick={() => revealSensitiveData(actor.id, 'phone')}
                                            className="px-2 py-1 bg-white dark:bg-zinc-800 hover:bg-zinc-100 dark:hover:bg-zinc-700 border border-zinc-200 dark:border-zinc-750 text-[10px] font-semibold rounded text-zinc-600 dark:text-zinc-300 transition-colors"
                                        >
                                            {decryptedPhone ? '숨김' : '해제 로그기록'}
                                        </button>
                                    </div>
                                </div>
                                <div className="flex justify-between items-center">
                                    <span className="text-zinc-500 text-[10px]">이메일 주소:</span>
                                    <div className="flex items-center gap-2">
                                        <span className="text-sm font-semibold">{decryptedEmail ? actor.email : '••••••••@mail.com'}</span>
                                        <button
                                            onClick={() => revealSensitiveData(actor.id, 'email')}
                                            className="px-2 py-1 bg-white dark:bg-zinc-800 hover:bg-zinc-100 dark:hover:bg-zinc-700 border border-zinc-200 dark:border-zinc-750 text-[10px] font-semibold rounded text-zinc-600 dark:text-zinc-300 transition-colors"
                                        >
                                            {decryptedEmail ? '숨김' : '해제 로그기록'}
                                        </button>
                                    </div>
                                </div>
                                <div className="flex justify-between items-center">
                                    <span className="text-zinc-500 text-[10px]">SNS 핸들:</span>
                                    <span className="font-semibold text-zinc-900 dark:text-zinc-100">{actor.sns}</span>
                                </div>
                            </div>
                        </div>

                        {/* Special Skills */}
                        <div>
                            <h4 className="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">보유 특기 (Special Skills)</h4>
                            <div className="flex flex-wrap gap-1.5">
                                {actor.skills.length > 0 ? actor.skills.map(skill => (
                                    <span key={skill} className="bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-400 border border-blue-100 dark:border-blue-800/40 text-xs px-2.5 py-1 rounded-lg font-semibold">
                                        {skill}
                                    </span>
                                )) : <p className="text-xs text-zinc-500">등록된 특기가 없습니다.</p>}
                            </div>
                        </div>

                        {/* Filmography */}
                        <div>
                            <h4 className="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">기존 출연작 (Filmography)</h4>
                            <div className="flex flex-wrap gap-1.5">
                                {actor.filmography.length > 0 ? actor.filmography.map(film => (
                                    <span key={film} className="bg-zinc-100 dark:bg-zinc-800 text-zinc-700 dark:text-zinc-300 text-xs px-2.5 py-1 rounded-lg border border-zinc-200 dark:border-zinc-700">
                                        {film}
                                    </span>
                                )) : <p className="text-xs text-zinc-500">지정된 출연 기록이 없습니다.</p>}
                            </div>
                        </div>

                        {/* Agency Collaboration History */}
                        <div>
                            <h4 className="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">본 대행사 협업 이력</h4>
                            {actor.collabHistory.length > 0 ? (
                                <div className="space-y-2">
                                    {actor.collabHistory.map((collab, idx) => (
                                        <div key={idx} className="p-3 bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-lg text-xs flex justify-between items-center">
                                            <div>
                                                <p className="font-bold text-zinc-900 dark:text-zinc-200">{collab.project}</p>
                                                <p className="text-[10px] text-zinc-500">배정 역할: {collab.role}</p>
                                            </div>
                                            <span className="text-[10px] text-zinc-400 font-mono">{collab.date}</span>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <p className="text-xs text-zinc-500">아직 본 대행사 소속으로 배치된 프로젝트가 없습니다.</p>
                            )}
                        </div>

                        {/* NDA Workflow Section */}
                        <div className="border-t border-zinc-200 dark:border-zinc-850 pt-5 space-y-4">
                            <div className="flex justify-between items-baseline">
                                <h4 className="text-xs font-bold text-zinc-900 dark:text-zinc-100">디지털 기밀서약서(NDA) 처리</h4>
                                <span className="text-[9px] text-blue-500 font-bold bg-blue-500/10 px-1.5 py-0.2 rounded border border-blue-500/20">작품별 개별 서약 집행 필수</span>
                            </div>
                            <p className="text-[10px] text-zinc-500">배우가 새로운 작품에 배치될 때마다, 매번 독립된 NDA 서약서 발송 및 서명이 집행되어야 법적 유효성이 인정됩니다.</p>
                            
                            <div className="space-y-3">
                                <div>
                                    <div className="flex justify-between items-baseline mb-1">
                                        <label className="block text-[10px] font-semibold text-zinc-500">적용할 신규 프로젝트 선택</label>
                                        <button
                                            type="button"
                                            onClick={() => {
                                                const newProj = prompt("등록할 새로운 작품명을 입력하세요:");
                                                if (newProj && newProj.trim()) {
                                                    const trimmed = newProj.trim();
                                                    if (projects.includes(trimmed)) {
                                                        alert("이미 존재하는 작품명입니다.");
                                                        return;
                                                    }
                                                    setProjects(prev => [...prev, trimmed]);
                                                    setSelectedProject(trimmed);
                                                    addLog('작품 등록', `배우 프로필 서랍에서 새 작품 [${trimmed}]을 등록했습니다.`);
                                                    alert(`[${trimmed}] 작품이 신규 등록되어 적용 프로젝트로 선택되었습니다.`);
                                                }
                                            }}
                                            className="text-[9px] font-bold text-blue-500 hover:underline cursor-pointer"
                                        >
                                            + 새 작품 직접 추가
                                        </button>
                                    </div>
                                    <select
                                        value={selectedProject}
                                        onChange={(e) => setSelectedProject(e.target.value)}
                                        className="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-lg px-2.5 py-1.5 text-xs focus:outline-none"
                                    >
                                        {projects.map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>
                                </div>

                                {projectNda ? (
                                    <div className="p-3 bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-lg text-xs space-y-2.5">
                                        <div className="flex justify-between items-center">
                                            <span className="font-semibold text-zinc-700 dark:text-zinc-300">서약서 상태:</span>
                                            {projectNda.status === 'signed' ? (
                                                <span className="text-xs font-semibold px-2 py-0.5 bg-emerald-500/10 text-emerald-600 rounded border border-emerald-500/20">
                                                    서명 완료
                                                </span>
                                            ) : (
                                                <span className="text-xs font-semibold px-2 py-0.5 bg-amber-500/10 text-amber-600 rounded border border-amber-500/20">

        // ==========================================
        // SUBCOMPONENT: NdaView (NDA Compliance Console)
        // ==========================================
        function NdaView({ ndas, setNdas, actors, setActors, projects, setProjects, addLog }) {
            const [selectedProject, setSelectedProject] = useState(projects[0]);
            
            // Custom NDA Clauses builder
            const [securityLevel, setSecurityLevel] = useState('Standard'); // Standard, High, Extreme

            const [customClause, setCustomClause] = useState('본 계약은 배우가 촬영 중 획득한 시나리오 내용, 캐스팅 정보, 의상 디자인, 세트장 사진을 외부나 SNS에 발설하지 않는 것을 목적으로 합니다.');
            
            // Multi Send lists
            const [targetActorsSearch, setTargetActorsSearch] = useState('');
            const [selectedActorIdsForNda, setSelectedActorIdsForNda] = useState([]);

            const filteredActorsForNda = useMemo(() => {
                if (!targetActorsSearch.trim()) return [];
                const q = targetActorsSearch.toLowerCase().trim();
                return actors.filter(a => 
                    (a.name.toLowerCase().includes(q) || a.id.toLowerCase().includes(q)) &&
                    !ndas.some(n => n.actorId === a.id && n.projectName === selectedProject)
                ).slice(0, 5);
            }, [actors, targetActorsSearch, ndas, selectedProject]);

            const handleAddActorToBatch = (actor) => {
                if (!selectedActorIdsForNda.includes(actor.id)) {
                    setSelectedActorIdsForNda(prev => [...prev, actor.id]);
                }
                setTargetActorsSearch('');
            };

            const handleRemoveFromBatch = (id) => {
                setSelectedActorIdsForNda(prev => prev.filter(x => x !== id));
            };

            // Process Batch NDA sending
            const handleBatchSend = () => {
                if (selectedActorIdsForNda.length === 0) {
                    return alert('서약서를 발송할 대상 배우를 선택해 주세요.');
                }

                const newNdaRecords = selectedActorIdsForNda.map(actorId => {
                    const actorObj = actors.find(a => a.id === actorId);
                    return {
                        id: `NDA-${String(Math.floor(Math.random() * 90000) + 10000)}`,
                        actorId,
                        actorName: actorObj?.name || '알수없음',
                        projectName: selectedProject,
                        status: 'sent',
                        sentDate: new Date().toISOString().split('T')[0],
                        signedDate: '',
                        hash: ''

                alert(`선택한 ${selectedActorIdsForNda.length}명의 배우에게 NDA 동의 카카오톡 알림톡 및 이메일이 발송되었습니다.`);
                setSelectedActorIdsForNda([]);
            };

                                                    if (projects.includes(trimmed)) {

                                                        return;

                                                    setSelectedProject(trimmed);
                                                    addLog('작품 등록', `NDA 콘솔에서 새 작품 [${trimmed}]을 등록했습니다.`);
                                                    alert(`[${trimmed}] 작품이 신규 등록되어 NDA 대상 프로젝트로 선택되었습니다.`);

                                                    if(level === 'High') setCustomClause('촬영장 내부 무단 사진 촬영이 전면 금지되며, 정보 유출 발생 시 민형사상 제작사 손해배상 청구에 따라 배상해야 합니다.');

                                {/* Selected List display */}
                                <div className="space-y-2">
                                    <label className="block text-xs font-semibold text-zinc-500">

                                    {selectedActorIdsForNda.length > 0 ? (

                                    <p>• 기밀 레벨: {securityLevel === 'Standard' ? '보통 등급' : securityLevel === 'High' ? '높음 (손해배상)' : '극비 (형사고발)'}</p>
                                </div>
                                <button
                                    onClick={handleBatchSend}
                                    className="bg-blue-600 hover:bg-blue-700 text-white rounded-lg px-4 py-2 text-xs font-semibold transition-colors shadow-sm flex items-center gap-1.5"
                                >
                                    <Icons.FileText className="w-4 h-4" />
                                    선택 배우 일괄 모바일 발송
                                </button>
                            </div>
                        </div>

                    </div>

                    {/* NDAs Archive History Table */}
                    <div className="bg-white dark:bg-[#0c0c0f] border border-zinc-200 dark:border-zinc-800 rounded-xl overflow-hidden shadow-sm">
                        <div className="px-6 py-4 border-b border-zinc-200 dark:border-zinc-800 bg-zinc-50/50 dark:bg-zinc-900/30">
                            <h3 className="text-sm font-bold text-zinc-900 dark:text-zinc-50">기밀서약서(NDA) 모니터링 및 아카이브</h3>

                                            <td className="px-6 py-3 font-mono text-[10px] text-zinc-400 truncate max-w-xs">{nda.hash || '-'}</td>
                                        </tr>

                            </table>

                    </div>
